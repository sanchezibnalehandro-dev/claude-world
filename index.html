<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Клод у костра</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ember:     #e8601a;
  --gold:      #c8943a;
  --gold-pale: #e8c878;
  --text:      #d4c8a8;
  --text-dim:  #7a6e58;
  --text-faint:#3a3428;
  --panel-bg:  rgba(8,6,4,0.96);
  --border:    rgba(140,100,40,0.2);
}
html, body { width: 100%; height: 100%; overflow: hidden; background: #060412; }
body { font-family: 'Cormorant Garamond', Georgia, serif; color: var(--text); display: flex; }
#scene { flex: 1; position: relative; overflow: hidden; }
#scene canvas { display: block; }

#loading {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #060412; z-index: 5; pointer-events: none;
  transition: opacity 1s ease;
}
#loading.hidden { opacity: 0; }
#loading-text {
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px;
  color: var(--gold); opacity: 0.6; margin-top: 16px;
}
.loading-dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
@keyframes dots {
  0%, 100% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; }
}
@keyframes spin { to { transform: rotate(360deg); } }

#diary-panel {
  width: 340px; min-width: 340px;
  background: var(--panel-bg); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100vh;
  position: relative; z-index: 10;
}
#diary-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#diary-title {
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase; opacity: 0.7; margin-bottom: 6px;
}
#clock-line { display: flex; align-items: baseline; gap: 10px; }
#clock-msk {
  font-family: 'Cinzel', serif; font-size: 26px; color: var(--gold-pale);
  font-weight: 500; text-shadow: 0 0 20px rgba(200,148,58,0.4); letter-spacing: 2px;
}
#clock-sub { font-size: 13px; color: var(--text-dim); font-style: italic; }
#phase-line { margin-top: 6px; font-size: 13px; color: var(--text-dim); display: flex; gap: 12px; flex-wrap: wrap; }

#resources {
  padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  display: flex; flex-wrap: wrap; gap: 6px 14px;
}
.res-chip { font-size: 15px; color: var(--text-dim); display: flex; align-items: center; gap: 4px; transition: color .3s; }
.res-chip.has { color: var(--text); }
.res-n { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); min-width: 16px; }

#world-panel, #needs-panel {
  padding: 12px 20px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.block-title {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-faint);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.world-line {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text-dim);
}
.world-line:last-child { margin-bottom: 0; }
.world-label { min-width: 64px; color: var(--text-faint); }
.world-value {
  text-align: right;
  color: var(--text);
  line-height: 1.35;
}
#intent-value {
  color: var(--gold-pale);
  font-style: italic;
}
#intent-meta {
  margin-top: 2px;
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.35;
}

.need-row { margin-bottom: 10px; }
.need-row:last-child { margin-bottom: 0; }
.need-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.need-bar {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(140,100,40,0.18);
  border-radius: 999px;
  overflow: hidden;
}
.need-fill {
  height: 100%;
  width: 0%;
  border-radius: 999px;
  transition: width .35s ease;
}
.need-fill-hunger  { background: linear-gradient(90deg, #7a3f14, #d26a1e); }
.need-fill-cold    { background: linear-gradient(90deg, #305a7a, #6aa7d8); }
.need-fill-fatigue { background: linear-gradient(90deg, #6b4c1b, #c89a4a); }
.need-fill-spirit  { background: linear-gradient(90deg, #4d6b3a, #8ebc63); }

#diary-scroll { flex: 1; overflow-y: auto; padding: 0; scrollbar-width: thin; scrollbar-color: #3a2a10 transparent; }
#diary-scroll::-webkit-scrollbar { width: 3px; }
#diary-scroll::-webkit-scrollbar-thumb { background: #3a2a10; }

.diary-day-group { padding: 16px 20px; border-bottom: 1px solid rgba(60,40,10,0.4); }
.diary-day-label {
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px;
  color: var(--text-faint); text-transform: uppercase; margin-bottom: 12px;
}
.entry { margin-bottom: 16px; animation: entryIn .5s ease forwards; opacity: 0; }
@keyframes entryIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.entry-time { font-size: 11px; color: var(--text-faint); letter-spacing: 1px; margin-bottom: 4px; }
.entry-thought { font-size: 18px; line-height: 1.6; color: var(--text); font-style: italic; }
.entry-action { font-size: 16px; color: var(--text-dim); line-height: 1.5; padding-left: 10px; border-left: 2px solid rgba(140,100,40,0.25); }
.entry-wish { font-size: 16px; color: #8a9870; line-height: 1.5; font-style: italic; }
.entry-wish::before { content: '✦ '; color: #5a7040; font-size: 11px; }
.entry-tag { display: inline-block; font-size: 10px; font-family: 'Cinzel', serif; letter-spacing: 1px; padding: 2px 7px; border-radius: 2px; margin-bottom: 5px; }
.tag-thought { background: rgba(200,148,58,0.1); color: var(--gold); border: 1px solid rgba(200,148,58,0.2); }
.tag-action  { background: rgba(100,140,80,0.1); color: #8aaa68; border: 1px solid rgba(100,140,80,0.2); }
.tag-wish    { background: rgba(80,100,160,0.1); color: #8090c0; border: 1px solid rgba(80,100,160,0.2); }

#agent-status { padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
#status-action { font-size: 15px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
#status-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--ember);
  animation: dotPulse 2s ease-in-out infinite; flex-shrink: 0;
}
@keyframes dotPulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
#status-text { font-style: italic; }
#visit-btn {
  display: block; width: 100%; margin-top: 10px; padding: 8px;
  background: rgba(200,148,58,0.08); border: 1px solid rgba(200,148,58,0.25);
  color: var(--gold); font-family: 'Cinzel', serif; font-size: 10px;
  letter-spacing: 2px; cursor: pointer; transition: all .2s;
}
#visit-btn:hover { background: rgba(200,148,58,0.15); border-color: rgba(200,148,58,0.5); color: var(--gold-pale); }
#visit-btn:disabled { opacity: .4; cursor: default; }
</style>
</head>
<body>

<div id="scene">
  <div id="loading">
    <svg width="40" height="40" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="16" fill="none" stroke="#c8943a" stroke-width="1.5" stroke-opacity="0.3"/>
      <circle cx="20" cy="20" r="16" fill="none" stroke="#e8601a" stroke-width="1.5"
        stroke-dasharray="25 75" stroke-linecap="round"
        style="animation: spin 1.2s linear infinite; transform-origin: center;">
      </circle>
    </svg>
    <div id="loading-text">КЛОД ВХОДИТ В МИР<span class="loading-dots"></span></div>
  </div>
</div>

<div id="diary-panel">
  <div id="diary-header">
    <div id="diary-title">Дневник отшельника</div>
    <div id="clock-line">
      <span id="clock-msk">--:--</span>
      <span id="clock-sub">МСК</span>
    </div>
    <div id="phase-line">
      <span id="phase-text">—</span>
      <span id="day-text" style="color:var(--text-faint)">День 1</span>
      <span id="weather-text">—</span>
    </div>
  </div>

  <div id="resources">
    <div class="res-chip" id="r-wood">🪵 <span class="res-n" id="rn-wood">0</span></div>
    <div class="res-chip" id="r-fish">🐟 <span class="res-n" id="rn-fish">0</span></div>
    <div class="res-chip" id="r-mush">🍄 <span class="res-n" id="rn-mush">0</span></div>
    <div class="res-chip" id="r-herb">🌿 <span class="res-n" id="rn-herb">0</span></div>
    <div class="res-chip" id="r-rod" title="Удочка">🎣 <span class="res-n" id="rn-rod">✗</span></div>
    <div class="res-chip" id="r-fire" title="Костёр">🔥 <span class="res-n" id="rn-fire" style="font-size:10px">погас</span></div>
  </div>

  <div id="world-panel">
    <div class="block-title">МИР И НАМЕРЕНИЕ</div>
    <div class="world-line">
      <span class="world-label">Место</span>
      <span class="world-value" id="location-value">У очага</span>
    </div>
    <div class="world-line">
      <span class="world-label">Линия</span>
      <div class="world-value">
        <div id="intent-value">держусь ближе к огню и собираю себя</div>
        <div id="intent-meta">сегодня · hut</div>
      </div>
    </div>
  </div>

  <div id="needs-panel">
    <div class="block-title">СОСТОЯНИЕ</div>

    <div class="need-row">
      <div class="need-head">
        <span>🍖 Голод</span>
        <span id="need-hunger-value">20/100</span>
      </div>
      <div class="need-bar"><div class="need-fill need-fill-hunger" id="need-hunger-fill"></div></div>
    </div>

    <div class="need-row">
      <div class="need-head">
        <span>🥶 Холод</span>
        <span id="need-cold-value">10/100</span>
      </div>
      <div class="need-bar"><div class="need-fill need-fill-cold" id="need-cold-fill"></div></div>
    </div>

    <div class="need-row">
      <div class="need-head">
        <span>😮‍💨 Усталость</span>
        <span id="need-fatigue-value">15/100</span>
      </div>
      <div class="need-bar"><div class="need-fill need-fill-fatigue" id="need-fatigue-fill"></div></div>
    </div>

    <div class="need-row">
      <div class="need-head">
        <span>🕯️ Дух</span>
        <span id="need-spirit-value">70/100</span>
      </div>
      <div class="need-bar"><div class="need-fill need-fill-spirit" id="need-spirit-fill"></div></div>
    </div>
  </div>

  <div id="diary-scroll"><div id="diary-entries"></div></div>

  <div id="agent-status">
    <div id="status-action">
      <div id="status-dot"></div>
      <span id="status-text">ожидает визита...</span>
    </div>
    <button id="visit-btn" onclick="triggerVisit()">▶ ВИЗИТ АГЕНТА</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fflate@0.6.10/umd/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  SUPABASE
// ═══════════════════════════════════════════════════════════
const SUPA_URL = 'https://zhngimueiubiwixnqmpt.supabase.co';
const SUPA_KEY = 'sb_publishable_dngGHGRs5qz5Z8BgxUAtzQ_vpXbi5q4';

async function supaFetch(table, params = '') {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}${params}`, {
    headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY }
  });
  if (!r.ok) throw new Error('Supabase Fetch ' + r.status);
  return r.json();
}

async function supaUpdate(table, id, data) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'PATCH',
    headers: {
      apikey: SUPA_KEY,
      Authorization: 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      Prefer: 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
}

async function supaInsert(table, data) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      apikey: SUPA_KEY,
      Authorization: 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      Prefer: 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
}

async function supaUpdateOptionalMeta() {
  try {
    await fetch(`${SUPA_URL}/rest/v1/claude_world_state?id=eq.1`, {
      method: 'PATCH',
      headers: {
        apikey: SUPA_KEY,
        Authorization: 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
        Prefer: 'return=minimal'
      },
      body: JSON.stringify({
        location: state.location,
        intent_label: state.intent.label,
        intent_focus: state.intent.focus,
        intent_horizon: state.intent.horizon,
        intent_reason: state.intent.reason,
        intent_age: state.intent.age
      })
    });
  } catch (e) {
    console.warn('optional world meta patch skipped', e);
  }
}

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const state = {
  day: 1,
  weather: 'clear',
  fire: true,
  fireWood: 8,
  inv: { wood: 2, fish: 0, mushroom: 0, herb: 0, rod: 0 },
  cellar: { fish: 0, mushroom: 0 },
  entries: [],
  summary: '',
  location: 'hut',
  visualActionType: 'rest_fire',
  intent: {
    label: 'держусь ближе к огню и собираю себя',
    focus: 'hut',
    horizon: 'today',
    reason: 'утро любит порядок и тёплый очаг',
    age: 0
  },
  needs: {
    hunger: 20,
    cold: 10,
    fatigue: 15,
    spirit: 70
  }
};

const ACTION_TYPES = new Set([
  'rest_fire',
  'relax',
  'sleep',
  'fish',
  'chop_wood',
  'gather_mushrooms'
]);

// ═══════════════════════════════════════════════════════════
//  WORLD HELPERS
// ═══════════════════════════════════════════════════════════
function describeLocation(loc) {
  return {
    hut: 'У очага',
    river: 'У реки',
    woods: 'В лесу'
  }[loc] || 'У очага';
}
function describeFocus(focus) {
  return {
    hut: 'дом',
    river: 'река',
    woods: 'лес',
    rest: 'покой',
    reflection: 'мысль',
    supplies: 'запас'
  }[focus] || focus || 'мир';
}
function describeHorizon(horizon) {
  return {
    now: 'сейчас',
    today: 'сегодня',
    until_evening: 'до вечера'
  }[horizon] || 'сегодня';
}
function clampNeed(v) {
  return Math.max(0, Math.min(100, Math.round(v)));
}
function safeText(v, fallback = '') {
  return typeof v === 'string' && v.trim() ? v.trim() : fallback;
}
function getMSK() {
  const now = new Date();
  return new Date(now.getTime() + (now.getTimezoneOffset() + 180) * 60000);
}
function getPhase(h) {
  if (h >= 5  && h < 7)  return { text: '🌅 Рассвет', amb: 0.3 };
  if (h >= 7  && h < 11) return { text: '☀️ Утро', amb: 0.85 };
  if (h >= 11 && h < 17) return { text: '🌞 День', amb: 1.0 };
  if (h >= 17 && h < 20) return { text: '🌇 Закат', amb: 0.6 };
  if (h >= 20 && h < 23) return { text: '🌙 Вечер', amb: 0.25 };
  return { text: '🌑 Ночь', amb: 0.12 };
}
function weatherLabel(code) {
  return { clear:'ясно', cloudy:'облачно', rain:'дождь', storm:'гроза' }[code] || code;
}
function weatherEmoji(code) {
  return { clear:'☀️', cloudy:'⛅', rain:'🌧️', storm:'⛈️' }[code] || '';
}
function describeNeed(name, value) {
  if (name === 'hunger') {
    if (value < 20) return 'почти не беспокоит';
    if (value < 40) return 'слегка напоминает о себе';
    if (value < 60) return 'уже ощутим';
    if (value < 80) return 'мешает думать';
    return 'становится мучительным';
  }
  if (name === 'cold') {
    if (value < 20) return 'телу спокойно';
    if (value < 40) return 'слегка зябко';
    if (value < 60) return 'холод пробирается под одежду';
    if (value < 80) return 'мерзнешь всерьез';
    return 'холод становится опасным';
  }
  if (name === 'fatigue') {
    if (value < 20) return 'тело бодрое';
    if (value < 40) return 'есть легкая усталость';
    if (value < 60) return 'сил заметно меньше';
    if (value < 80) return 'тяжело заставлять себя работать';
    return 'тело просит остановиться';
  }
  if (name === 'spirit') {
    if (value < 20) return 'внутри почти темно';
    if (value < 40) return 'держишься с трудом';
    if (value < 60) return 'настроение неровное';
    if (value < 80) return 'в целом держишься';
    return 'внутри есть опора';
  }
  return '';
}
function defaultIntentForLocation(loc) {
  if (loc === 'river') {
    return {
      label: 'слежу за рекой и прислушиваюсь к воде',
      focus: 'river',
      horizon: 'today',
      reason: 'день тянет к течению и живому движению',
      age: 0
    };
  }
  if (loc === 'woods') {
    return {
      label: 'иду в лес и позволяю ему самому подсказать занятие',
      focus: 'woods',
      horizon: 'today',
      reason: 'лес лучше слышно, когда не тащишь его силой',
      age: 0
    };
  }
  return {
    label: 'держусь ближе к огню и собираю себя',
    focus: 'hut',
    horizon: 'today',
    reason: 'у дома лучше слышно, чего на самом деле хочется',
    age: 0
  };
}
function normalizeDecision(raw) {
  const d = raw && typeof raw === 'object' ? raw : {};
  const actionType = safeText(d.action_type, '').toLowerCase();

  return {
    action_type: ACTION_TYPES.has(actionType) ? actionType : null,
    main_action: safeText(d.main_action, 'Клод задержался на месте и ничего не стал ломать силой.'),
    minor_action: safeText(d.minor_action, ''),
    thought: safeText(d.thought, 'Тишина не всегда даёт ответы, но она умеет возвращать ритм дыхания.'),
    wish: safeText(d.wish, ''),
    new_summary: safeText(d.new_summary, ''),
    next_location: ['hut','river','woods'].includes(d.next_location) ? d.next_location : state.location,
    new_intent: d.new_intent && typeof d.new_intent === 'object' ? {
      label: safeText(d.new_intent.label, state.intent.label),
      focus: safeText(d.new_intent.focus, state.intent.focus),
      horizon: safeText(d.new_intent.horizon, state.intent.horizon),
      reason: safeText(d.new_intent.reason, state.intent.reason)
    } : null,
    wood_delta: Number(d.wood_delta || 0),
    fish_delta: Number(d.fish_delta || 0),
    mushroom_delta: Number(d.mushroom_delta || 0),
    herb_delta: Number(d.herb_delta || 0),
    made_rod: Boolean(d.made_rod),
    lit_fire: Boolean(d.lit_fire),
    feed_fire: Boolean(d.feed_fire),
    cook_fish: Number(d.cook_fish || 0),
    eat_mush: Number(d.eat_mush || 0),
    cellar_fish_delta: Number(d.cellar_fish_delta || 0),
    cellar_mush_delta: Number(d.cellar_mush_delta || 0)
  };
}
function updateNeeds(d) {
  const n = state.needs;
  const h = getMSK().getHours();

  n.hunger += 6;
  n.fatigue += 2;

  if (state.weather === 'rain') n.cold += 3;
  if (state.weather === 'storm') n.cold += 5;

  if (state.fire && state.location === 'hut') {
    n.cold -= 10;
  } else if (h >= 18 || h < 7) {
    n.cold += 7;
  } else {
    n.cold += 2;
  }

  if (d.wood_delta > 0) { n.fatigue += 6; n.spirit -= 1; }
  if (d.fish_delta > 0) { n.fatigue += 4; n.spirit += 1; }
  if (d.mushroom_delta > 0 || d.herb_delta > 0) { n.fatigue += 2; n.spirit += 1; }
  if (d.made_rod) { n.fatigue += 1; n.spirit += 2; }
  if (d.lit_fire) { n.cold -= 22; n.spirit += 5; }

    d.made_rod || d.lit_fire || d.feed_fire || d.cook_fish > 0 ||
    d.cellar_fish_delta !== 0 || d.cellar_mush_delta !== 0

  if (n.fatigue > 80) n.spirit -= 4;

function chooseActionTypeFromDecision(d) {

function applyCharacterPlacement(mesh, pos, lookAt) {
  if (!mesh || !pos) return;
  mesh.position.set(...pos);
  if (lookAt) mesh.lookAt(...lookAt);
}

function applyFBXMaterials(fbx) {
  fbx.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
      child.frustumCulled = false;
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach(mat => {
        if (mat) mat.skinning = true;
      });
    }
  });
}

function stopAllCachedActions() {
  Object.values(animCache).forEach(entry => {
    if (entry?.action) entry.action.stop();
  });
}

async function loadAnimationClip(key) {
  if (animCache[key]) return animCache[key];
  const path = MODEL_PATHS[key];
  if (!path) return null;

  return await new Promise((resolve) => {
    const loader = new THREE.FBXLoader();

    loader.load(
      path,
      (fbx) => {
        fbx.scale.setScalar(CHAR_SCALE);
        applyFBXMaterials(fbx);

        const localMixer = new THREE.AnimationMixer(fbx);
        const clip = fbx.animations && fbx.animations.length > 0 ? fbx.animations[0] : null;
        const action = clip ? localMixer.clipAction(clip) : null;

        animCache[key] = {
          mesh: fbx,
          mixer: localMixer,
          clip,
          action
        };

        resolve(animCache[key]);
      },
      null,
      (err) => {
        console.warn(`Animation not loaded: ${path}`, err);
        resolve(null);
      }
    );
  });
}

async function playAnimationClip(key, { pos, lookAt, once = false } = {}) {
  if (!scene) return null;

  const entry = await loadAnimationClip(key);
  if (!entry) return null;

  stopAllCachedActions();

  if (characterGroup && characterGroup.parent) {
    scene.remove(characterGroup);
  }

  characterGroup = entry.mesh;
  mixer = entry.mixer;
  scene.add(characterGroup);

  applyCharacterPlacement(characterGroup, pos || [CHAR_X, 0, CHAR_Z], lookAt);

  if (entry.action) {
    entry.action.reset();
    entry.action.enabled = true;
    entry.action.paused = false;
    entry.action.clampWhenFinished = once;
    entry.action.setLoop(once ? THREE.LoopOnce : THREE.LoopRepeat, once ? 1 : Infinity);
    entry.action.play();
  }

  return entry;
}

async function runSleepScene(token) {
  const cfg = ACTION_SCENES.sleep;

  const intro = await playAnimationClip(cfg.introKey, {
    pos: cfg.pos,
    lookAt: cfg.lookAt,
    once: true
  });

  if (token !== actionNonce || currentActionType !== 'sleep') return;

  if (!intro || !intro.clip) {
    await playAnimationClip(cfg.loopKey, {
      pos: cfg.pos,
      lookAt: cfg.lookAt
    });
    return;
  }

  const ms = Math.max(500, intro.clip.duration * 1000);

  actionTimeout = setTimeout(async () => {
    if (token !== actionNonce || currentActionType !== 'sleep') return;

    await playAnimationClip(cfg.loopKey, {
      pos: cfg.pos,
      lookAt: cfg.lookAt
    });
  }, ms);
}

function scheduleFishingVariation(token) {
  const cfg = ACTION_SCENES.fish;

  fishingTimeout = setTimeout(async () => {
    if (token !== actionNonce || currentActionType !== 'fish') return;

    const cast = await playAnimationClip(cfg.altKey, {
      pos: cfg.pos,
      lookAt: cfg.lookAt,
      once: true
    });

    if (token !== actionNonce || currentActionType !== 'fish') return;

    if (!cast || !cast.clip) {
      await playAnimationClip(cfg.loopKey, {
        pos: cfg.pos,
        lookAt: cfg.lookAt
      });
      scheduleFishingVariation(token);
      return;
    }

    const ms = Math.max(500, cast.clip.duration * 1000);

    actionTimeout = setTimeout(async () => {
      if (token !== actionNonce || currentActionType !== 'fish') return;

      await playAnimationClip(cfg.loopKey, {
        pos: cfg.pos,
        lookAt: cfg.lookAt
      });

      scheduleFishingVariation(token);
    }, ms);
  }, 7000 + Math.random() * 7000);
}

async function runFishingScene(token) {
  const cfg = ACTION_SCENES.fish;

  const idle = await playAnimationClip(cfg.loopKey, {
    pos: cfg.pos,
    lookAt: cfg.lookAt
  });

  if (token !== actionNonce || currentActionType !== 'fish') return;
  if (!idle) return;

  scheduleFishingVariation(token);
}

async function setActionByType(actionType) {
  const finalType = ACTION_TYPES.has(actionType) ? actionType : chooseDefaultActionType();

  currentActionType = finalType;
  state.visualActionType = finalType;
  actionNonce += 1;

  const token = actionNonce;
  clearActionTimers();

  if (finalType === 'sleep') {
    await runSleepScene(token);
    return;
  }

  if (finalType === 'fish') {
    await runFishingScene(token);
    return;
  }

  const cfg = ACTION_SCENES[finalType];
  if (!cfg) return;

  await playAnimationClip(cfg.clipKey, {
    pos: cfg.pos,
    lookAt: cfg.lookAt
  });
}

function animateLoop() {
  requestAnimationFrame(animateLoop);
  const delta = clock3.getDelta();
  const t = clock3.elapsedTime;
  if (mixer) mixer.update(delta);

  if (fireLight && state.fire) {
    fireLight.intensity = 3.0 + Math.sin(t*7.1)*0.5 + Math.sin(t*13.3)*0.3 + Math.sin(t*19.7)*0.15;
    if (Math.random() > 0.97) fireLight.color.setHex(0xff9040);
    else fireLight.color.setHex(0xff6820);
  }
  if (flameGroup) {
    flameGroup.visible = state.fire;
    flameGroup.scale.x = 0.82 + Math.sin(t*8.3)*0.18;
    flameGroup.scale.z = 0.82 + Math.sin(t*6.9)*0.18;
    flameGroup.scale.y = 0.88 + Math.sin(t*10.5)*0.14;
    flameGroup.rotation.y = Math.sin(t*3.1)*0.2;
    flameGroup.position.y = 0.1 + Math.sin(t*12.7)*0.022;
  }
  renderer.render(scene, camera);
}

function updateSky(h, amb) {
  if (!renderer) return;
  const SKIES = [[5,7,0x6a2448],[7,11,0x2a5080],[11,17,0x2860a8],[17,20,0x7a2808],[20,23,0x1a0c30]];
  let col = 0x090418;
  for (const [a,b,c] of SKIES) if (h>=a && h<b) { col=c; break; }
  renderer.setClearColor(col, 1);
  if (scene) scene.fog.color.setHex(col);
  if (ambientLight) ambientLight.intensity = 0.25 + amb * 1.1;
  if (moonLight) {
    moonLight.intensity = 0.1 + amb * 0.75;
    const dayCol = new THREE.Color(0xfff0c0);
    const nightCol = new THREE.Color(0x6080c0);
    moonLight.color.lerpColors(nightCol, dayCol, amb);
  }
}

- убрать рыбу в погреб
- достать рыбу из погреба
- поправить снасти
- ничего не делать дополнительно

Малое действие не должно ломать главную сцену.

--- ПОТРЕБНОСТИ ---
Тебе передаются hunger, cold, fatigue, spirit.
Они не отдают приказы. Они меняют притяжение вариантов.

- hunger тянет к еде, реке, возвращению с добычей
- cold тянет к огню, дому, укрытию
- fatigue тянет к более тихим, коротким, щадящим решениям
- spirit влияет на глубину мыслей, стойкость и дальность внутреннего горизонта

--- РЕСУРСЫ И БЫТ ---
- wood_delta только для леса
- fish_delta только у реки
- mushroom_delta / herb_delta только в лесу
- made_rod / lit_fire / feed_fire / cook_fish / cellar_* — только у хижины
- рыбу нельзя есть сырой
- грибы можно есть сырыми
- крафт удочки стоит 1 дерево
- розжиг очага стоит 2 дерева
- подбросить в огонь стоит 1 дерево

--- THOUGHT / WISH ---
thought — не отчет системы. Это душа момента.
Она должна быть:
- связана с местом
- связана со временем суток
- связана с внутренним состоянием
- красивой и трогающей
- без вранья о фактах мира

wish — мягкая линия того, куда тебя тянет дальше.
Это не команда, а внутренняя направленность.

Ответь ТОЛЬКО валидным JSON без markdown и без пояснений.
JSON начинается с { и заканчивается }.

{
  "action_type": "rest_fire|relax|sleep|fish|chop_wood|gather_mushrooms",
  "main_action": "одно главное действие",
  "minor_action": "одно малое бытовое действие или null",
  "thought": "лаконичная, емкая, красивая мысль-заметка от первого лица",
  "wish": "мягкая линия намерения или null",
  "new_summary": "обновленная долгая память или null",
  "next_location": "hut|river|woods",
  "new_intent": {
    "label": "короткая линия поведения",
    "focus": "hut|river|woods|rest|reflection|supplies",
    "horizon": "now|today|until_evening",
    "reason": "почему тебя сейчас туда тянет"
  },
  "wood_delta": 0,
  "fish_delta": 0,
  "mushroom_delta": 0,
  "herb_delta": 0,
  "made_rod": false,
  "lit_fire": false,
  "feed_fire": false,
  "cook_fish": 0,
  "eat_mush": 0,
  "cellar_fish_delta": 0,
  "cellar_mush_delta": 0
}`;

function buildContext() {
  const msk = getMSK();
  const h = msk.getHours();
  const m = msk.getMinutes();
  const phase = getPhase(h);
  const inv = state.inv;
  const needs = state.needs;
  const longTermMemory = state.summary || 'Я только начал свой путь в этом лесу. Прошлых записей нет.';
  const innerStateText = [
    `Голод: ${needs.hunger}/100 — ${describeNeed('hunger', needs.hunger)}`,
    `Холод: ${needs.cold}/100 — ${describeNeed('cold', needs.cold)}`,
    `Усталость: ${needs.fatigue}/100 — ${describeNeed('fatigue', needs.fatigue)}`,
    `Дух: ${needs.spirit}/100 — ${describeNeed('spirit', needs.spirit)}`
  ].join('\n');

  const recentHistory = state.entries.slice(0, 8)
    .map(e => `— ${e.time} [${e.type}]: ${e.text}`)
    .join('\n') || '— Пока ничего не произошло.';

  return `ТВОЯ ДОЛГАЯ ПАМЯТЬ:
${longTermMemory}

ТЕКУЩАЯ ЛОКАЦИЯ:
${state.location} (${describeLocation(state.location)})

CURRENT_INTENT:
label: ${state.intent.label}
focus: ${state.intent.focus}
horizon: ${state.intent.horizon}
reason: ${state.intent.reason}
age: ${state.intent.age}

ТЕКУЩЕЕ СОСТОЯНИЕ:
Время: ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} МСК, ${phase.text}
День: ${state.day}, Погода: ${weatherLabel(state.weather)}
Инвентарь: дерево=${inv.wood}, рыба=${inv.fish}, грибы=${inv.mushroom}, травы=${inv.herb}, удочка=${inv.rod > 0 ? inv.rod + '/10' : 'нет'}
Очаг: ${state.fire ? `горит (${state.fireWood.toFixed(1)})` : 'погас'}
Погреб: рыба=${state.cellar.fish}, грибы=${state.cellar.mushroom}

ВНУТРЕННЕЕ СОСТОЯНИЕ:
${innerStateText}

ПОСЛЕДНИЕ СОБЫТИЯ:
${recentHistory}

Сделай один живой визит без телепортации и без амнезии.`;
}

function extractAgentPayload(rawText) {
  const cleaned = String(rawText || '').replace(/```json|```/g, '').trim();
  const start = cleaned.indexOf('{');
  const end = cleaned.lastIndexOf('}');
  if (start === -1 || end === -1 || end <= start) {
    throw new Error('В ответе агента не найден корректный JSON-объект');
  }
  return JSON.parse(cleaned.slice(start, end + 1));
}

async function triggerVisit() {
  if (agentBusy) return;
  agentBusy = true;
  const btn = document.getElementById('visit-btn');
  const st = document.getElementById('status-text');
  btn.disabled = true;
  btn.textContent = '⌛ КЛОД ДУМАЕТ...';
  st.textContent = 'Клод входит в мир...';

  try {
    const res = await fetch('/api/agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 700,
        system: AGENT_PROMPT,
        messages: [{ role: 'user', content: buildContext() }]
      })
    });

    const data = await res.json();
    if (!res.ok) {
      console.error('Ошибка /api/agent:', data);
      throw new Error(data?.error?.message || data?.error || 'Сервер агента вернул ошибку');
    }
    const raw = data.content?.find(b => b.type === 'text')?.text;
    if (!raw) throw new Error('Сервер вернул ответ без content.text');
    const payload = extractAgentPayload(raw);
    await applyDecision(normalizeDecision(payload));
  } catch (e) {
    console.error('Ошибка визита агента:', e);
    st.textContent = 'Ошибка ответа агента';
    addEntry({ type: 'action', text: `⚠️ Визит сорвался: ${e.message}` });
  }

  agentBusy = false;
  btn.disabled = false;
  btn.textContent = '▶ ВИЗИТ АГЕНТА';
  st.textContent = 'Клод у костра';
}

async function applyDecision(d) {
  const inv = state.inv;
  const oldLocation = state.location;
  const notes = scrubContradictions(d);
  const newEntries = [];

  if (d.next_location !== oldLocation) {
    state.location = d.next_location;
    newEntries.push({ type: 'action', text: d.main_action });
  } else {
    newEntries.push({ type: 'action', text: d.main_action });
    if (d.minor_action) newEntries.push({ type: 'action', text: d.minor_action });
  }

  notes.forEach(text => newEntries.push({ type: 'action', text }));

  if (d.wood_delta) inv.wood = Math.max(0, inv.wood + d.wood_delta);
  if (d.mushroom_delta) inv.mushroom = Math.max(0, inv.mushroom + d.mushroom_delta);
  if (d.herb_delta) inv.herb = Math.max(0, inv.herb + d.herb_delta);

  if (d.made_rod && inv.wood >= 1 && inv.rod <= 0 && state.location === 'hut') {
    inv.rod = 10;
    inv.wood -= 1;
  }

  if (d.fish_delta > 0 && state.location === 'river') {
    if (inv.rod > 0) {
      inv.fish += d.fish_delta;
      inv.rod = Math.max(0, inv.rod - 1);
      if (inv.rod <= 0) {
        newEntries.push({ type: 'action', text: 'Удочка с треском сломалась. Клоду придётся собирать новую.' });
      }
    } else {
      newEntries.push({ type: 'action', text: 'У воды он только усмехнулся себе: без удочки река не отдаёт ничего.' });
    }
  }

  if (d.cellar_fish_delta > 0 && state.location === 'hut' && inv.fish >= d.cellar_fish_delta) {
    inv.fish -= d.cellar_fish_delta;
    state.cellar.fish += d.cellar_fish_delta;
  } else if (d.cellar_fish_delta < 0 && state.location === 'hut' && state.cellar.fish >= Math.abs(d.cellar_fish_delta)) {
    inv.fish += Math.abs(d.cellar_fish_delta);
    state.cellar.fish -= Math.abs(d.cellar_fish_delta);
  }

  if (d.cellar_mush_delta > 0 && state.location === 'hut' && inv.mushroom >= d.cellar_mush_delta) {
    inv.mushroom -= d.cellar_mush_delta;
    state.cellar.mushroom += d.cellar_mush_delta;
  } else if (d.cellar_mush_delta < 0 && state.location === 'hut' && state.cellar.mushroom >= Math.abs(d.cellar_mush_delta)) {
    inv.mushroom += Math.abs(d.cellar_mush_delta);
    state.cellar.mushroom -= Math.abs(d.cellar_mush_delta);
  }

  if (d.cook_fish > 0 && state.location === 'hut' && inv.fish >= d.cook_fish) {
    if (state.fire || d.lit_fire) {
      inv.fish -= d.cook_fish;
    } else {
      newEntries.push({ type: 'action', text: 'Без огня рыба так и осталась обещанием ужина.' });
    }
  }

  if (d.eat_mush > 0 && inv.mushroom >= d.eat_mush) {
    inv.mushroom -= d.eat_mush;
  }

  if (d.lit_fire && inv.wood >= 2 && !state.fire && state.location === 'hut') {
    state.fire = true;
    state.fireWood = 8;
    inv.wood -= 2;
    setFireState(true);
  } else if (d.feed_fire && state.fire && inv.wood >= 1 && state.location === 'hut') {
    state.fireWood = Math.min(8, state.fireWood + 3);
    inv.wood -= 1;
  }

  updateNeeds(d);

  if (d.thought) newEntries.push({ type: 'thought', text: d.thought });
  if (d.wish) newEntries.push({ type: 'wish', text: d.wish });

  if (d.new_summary) state.summary = d.new_summary;
  let intentChanged = false;
  if (d.new_intent) {
    state.intent = { ...d.new_intent, age: 0 };
    intentChanged = true;
  } else if (oldLocation !== state.location) {
    state.intent = defaultIntentForLocation(state.location);
    intentChanged = true;
  }
  updateIntentAge(intentChanged);

  newEntries.forEach(e => addEntry(e));
  updateResources();
  updateClock();

  const finalActionType = chooseActionTypeFromDecision(d);
  await setActionByType(finalActionType);
  document.getElementById('status-text').textContent = actionStatusText(finalActionType);

  try {
    await supaUpdate('claude_world_state', 1, {
      fire: state.fire,
      fire_wood: state.fireWood,
      inv_wood: state.inv.wood,
      inv_fish: state.inv.fish,
      inv_mushroom: state.inv.mushroom,
      inv_herb: state.inv.herb,
      inv_rod: state.inv.rod,
      cellar_fish: state.cellar.fish,
      cellar_mushroom: state.cellar.mushroom,
      summary: state.summary,
      hunger: state.needs.hunger,
      cold: state.needs.cold,
      fatigue: state.needs.fatigue,
      spirit: state.needs.spirit
    });
    for (const e of newEntries) {
      await supaInsert('claude_world_diary', { type: e.type, text: e.text, time: e.time, day: e.day });
    }
    await supaUpdateOptionalMeta();
  } catch (err) {
    console.error('Ошибка при сохранении в базу:', err);
  }
}

// ═══════════════════════════════════════════════════════════
//  POLL SUPABASE
// ═══════════════════════════════════════════════════════════
let _lastDiaryLen = 0;
async function pollFiles() {
  try {
    const rows = await supaFetch('claude_world_state', '?id=eq.1&select=*');
    if (rows && rows[0]) {
      const s = rows[0];
      state.day = s.day ?? state.day;
      state.weather = s.weather ?? state.weather;
      state.fire = s.fire ?? state.fire;
      state.fireWood = s.fire_wood ?? state.fireWood;
      state.inv.wood = s.inv_wood ?? state.inv.wood;
      state.inv.fish = s.inv_fish ?? state.inv.fish;
      state.inv.mushroom = s.inv_mushroom ?? state.inv.mushroom;
      state.inv.herb = s.inv_herb ?? state.inv.herb;
      state.inv.rod = s.inv_rod ?? state.inv.rod;
      state.cellar.fish = s.cellar_fish ?? state.cellar.fish;
      state.cellar.mushroom = s.cellar_mushroom ?? state.cellar.mushroom;
      state.summary = s.summary ?? state.summary;
      state.needs.hunger = s.hunger ?? state.needs.hunger;
      state.needs.cold = s.cold ?? state.needs.cold;
      state.needs.fatigue = s.fatigue ?? state.needs.fatigue;
      state.needs.spirit = s.spirit ?? state.needs.spirit;

      state.location = s.location ?? state.location;
      state.intent.label = s.intent_label ?? state.intent.label;
      state.intent.focus = s.intent_focus ?? state.intent.focus;
      state.intent.horizon = s.intent_horizon ?? state.intent.horizon;
      state.intent.reason = s.intent_reason ?? state.intent.reason;
      state.intent.age = s.intent_age ?? state.intent.age;

      updateResources();
      updateClock();
      setFireState(state.fire);
            if (!bootPoseSynced && !agentBusy) {
        bootPoseSynced = true;
        await setActionByType(chooseDefaultActionType());
        document.getElementById('status-text').textContent = actionStatusText(currentActionType);
      }
    }
  } catch (e) {
    console.warn('state poll', e);
  }

  try {
    const entries = await supaFetch('claude_world_diary', '?select=*&order=id.desc&limit=100');
    if (entries && entries.length !== _lastDiaryLen) {
      _lastDiaryLen = entries.length;
      const existingTexts = new Set(state.entries.map(e => e.text + e.time));
      const newOnes = entries.filter(e => !existingTexts.has(e.text + e.time));

      if (newOnes.length > 0) {
        state.entries = [...newOnes, ...state.entries].slice(0, 100);
        renderDiary();
        document.getElementById('status-text').textContent = actionStatusText(currentActionType || state.visualActionType);
      }
    }
  } catch (e) {
    console.warn('diary poll', e);
  }
}

window.addEventListener('load', () => {
  if (typeof THREE === 'undefined') {
    document.getElementById('loading-text').textContent = 'Ошибка загрузки 3D движка';
    return;
  }
  initThree();
  updateClock();
  updateResources();
  updateNightElements(getPhase(getMSK().getHours()).amb);
  addEntry({ type: 'thought', text: 'Мир проснулся не для подвигов. Просто в темноте снова нашлось место, где можно быть.' });

  setInterval(updateClock, 10000);
  setInterval(pollFiles, 8000);
  pollFiles();

  setInterval(async () => {
    if (state.fire) {
      state.fireWood -= 0.0085;
      if (state.fireWood <= 0) {
        state.fire = false;
        state.fireWood = 0;
        const e = { type: 'action', text: 'Очаг догорел. В хижине стало тише и холоднее, но не страшнее.' };
        addEntry(e);
        setFireState(false);
        try {
          await supaInsert('claude_world_diary', { type: e.type, text: e.text, time: e.time, day: e.day });
        } catch (err) { console.warn(err); }
      }
      try {
        await supaUpdate('claude_world_state', 1, { fire: state.fire, fire_wood: state.fireWood });
      } catch (err) {
        console.warn(err);
      }
      updateClock();
    }
  }, 60000);
});
