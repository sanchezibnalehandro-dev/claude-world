<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Клод у костра</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ember:     #e8601a;
  --gold:      #c8943a;
  --gold-pale: #e8c878;
  --text:      #d4c8a8;
  --text-dim:  #7a6e58;
  --text-faint:#3a3428;
  --panel-bg:  rgba(8,6,4,0.96);
  --border:    rgba(140,100,40,0.2);
}
html, body { width: 100%; height: 100%; overflow: hidden; background: #060412; }
body { font-family: 'Cormorant Garamond', Georgia, serif; color: var(--text); display: flex; }

/* ── Scene ── */
#scene { flex: 1; position: relative; overflow: hidden; }
#scene canvas { display: block; }

/* ── Loading overlay ── */
#loading {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #060412; z-index: 5; pointer-events: none;
  transition: opacity 1s ease;
}
#loading.hidden { opacity: 0; }
#loading-text {
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px;
  color: var(--gold); opacity: 0.6; margin-top: 16px;
}
.loading-dots::after {
  content: ''; animation: dots 1.5s steps(4, end) infinite;
}
@keyframes dots {
  0%, 100% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; }
}

/* ── Diary Panel ── */
#diary-panel {
  width: 320px; min-width: 320px;
  background: var(--panel-bg); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100vh;
  position: relative; z-index: 10;
}
#diary-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#diary-title {
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase; opacity: 0.7; margin-bottom: 6px;
}
#clock-line { display: flex; align-items: baseline; gap: 10px; }
#clock-msk {
  font-family: 'Cinzel', serif; font-size: 26px; color: var(--gold-pale);
  font-weight: 500; text-shadow: 0 0 20px rgba(200,148,58,0.4); letter-spacing: 2px;
}
#clock-sub { font-size: 13px; color: var(--text-dim); font-style: italic; }
#phase-line { margin-top: 6px; font-size: 13px; color: var(--text-dim); display: flex; gap: 12px; }

#resources {
  padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  display: flex; flex-wrap: wrap; gap: 6px 14px;
}
.res-chip { font-size: 15px; color: var(--text-dim); display: flex; align-items: center; gap: 4px; transition: color .3s; }
.res-chip.has { color: var(--text); }
.res-n { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); min-width: 16px; }

#diary-scroll { flex: 1; overflow-y: auto; padding: 0; scrollbar-width: thin; scrollbar-color: #3a2a10 transparent; }
#diary-scroll::-webkit-scrollbar { width: 3px; }
#diary-scroll::-webkit-scrollbar-thumb { background: #3a2a10; }

.diary-day-group { padding: 16px 20px; border-bottom: 1px solid rgba(60,40,10,0.4); }
.diary-day-label {
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px;
  color: var(--text-faint); text-transform: uppercase; margin-bottom: 12px;
}
.entry { margin-bottom: 16px; animation: entryIn .5s ease forwards; opacity: 0; }
@keyframes entryIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.entry-time { font-size: 11px; color: var(--text-faint); letter-spacing: 1px; margin-bottom: 4px; }
.entry-thought { font-size: 18px; line-height: 1.6; color: var(--text); font-style: italic; }
.entry-action { font-size: 16px; color: var(--text-dim); line-height: 1.5; padding-left: 10px; border-left: 2px solid rgba(140,100,40,0.25); }
.entry-wish { font-size: 16px; color: #8a9870; line-height: 1.5; font-style: italic; }
.entry-wish::before { content: '✦ '; color: #5a7040; font-size: 11px; }
.entry-tag { display: inline-block; font-size: 10px; font-family: 'Cinzel', serif; letter-spacing: 1px; padding: 2px 7px; border-radius: 2px; margin-bottom: 5px; }
.tag-thought { background: rgba(200,148,58,0.1); color: var(--gold); border: 1px solid rgba(200,148,58,0.2); }
.tag-action  { background: rgba(100,140,80,0.1); color: #8aaa68; border: 1px solid rgba(100,140,80,0.2); }
.tag-wish    { background: rgba(80,100,160,0.1); color: #8090c0; border: 1px solid rgba(80,100,160,0.2); }

#agent-status { padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
#status-action { font-size: 15px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
#status-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--ember);
  animation: dotPulse 2s ease-in-out infinite; flex-shrink: 0;
}
@keyframes dotPulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
#status-text { font-style: italic; }
#visit-btn {
  display: block; width: 100%; margin-top: 10px; padding: 8px;
  background: rgba(200,148,58,0.08); border: 1px solid rgba(200,148,58,0.25);
  color: var(--gold); font-family: 'Cinzel', serif; font-size: 10px;
  letter-spacing: 2px; cursor: pointer; transition: all .2s;
}
#visit-btn:hover { background: rgba(200,148,58,0.15); border-color: rgba(200,148,58,0.5); color: var(--gold-pale); }
#visit-btn:disabled { opacity: .4; cursor: default; }
</style>
</head>
<body>

<div id="scene">
  <div id="loading">
    <svg width="40" height="40" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="16" fill="none" stroke="#c8943a" stroke-width="1.5" stroke-opacity="0.3"/>
      <circle cx="20" cy="20" r="16" fill="none" stroke="#e8601a" stroke-width="1.5"
        stroke-dasharray="25 75" stroke-linecap="round"
        style="animation: spin 1.2s linear infinite; transform-origin: center;">
      </circle>

<div id="diary-panel">
  <div id="diary-header">
    <div id="diary-title">Дневник отшельника</div>
    <div id="clock-line">
      <span id="clock-msk">--:--</span>
      <span id="clock-sub">МСК</span>
    </div>
    <div id="phase-line">
      <span id="phase-text">—</span>
      <span id="day-text" style="color:var(--text-faint)">День 1</span>

    </div>
  </div>
  <div id="resources">
    <div class="res-chip" id="r-wood">🪵 <span class="res-n" id="rn-wood">0</span></div>

    <div class="res-chip" id="r-rod" title="Удочка">🎣 <span class="res-n" id="rn-rod">✗</span></div>

  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fflate@0.6.10/umd/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  SUPABASE
// ═══════════════════════════════════════════════════════════
const SUPA_URL = 'https://zhngimueiubiwixnqmpt.supabase.co';
const SUPA_KEY = 'sb_publishable_dngGHGRs5qz5Z8BgxUAtzQ_vpXbi5q4';
async function supaFetch(table, params = '') {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}${params}`, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  });
  if (!r.ok) throw new Error('Supabase ' + r.status);
  return r.json();
}

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const state = {
  day: 1, weather: 'clear', fire: true, fireWood: 3,
  inv: { wood: 2, fish: 0, mushroom: 0, herb: 0, rod: 0 },
  cellar: { fish: 0, mushroom: 0 },
  entries: [], lastVisit: null,
};

// ═══════════════════════════════════════════════════════════
//  THREE.JS GLOBALS
// ═══════════════════════════════════════════════════════════
let renderer, scene, camera, clock3;
let ambientLight, moonLight, fireLight;
let starParticles, flameGroup;
let characterGroup, mixer;
const animCache = {};
const FRUSTUM = 11;

// ── Character constants ──────────────────────────────────────
// Mixamo built-in chars export in cm → scale 0.01 = metres.
// +10% from previous working size:
const CHAR_SCALE = 0.011;
// Ground is at world Y = 0. Each animation needs a different Y
// offset so the contact point (butt/feet/body) aligns with ground.
// Tweak ANIM_GROUND_Y if a pose floats or clips through the floor.
const ANIM_GROUND_Y = {
  sitting:  -0.35,  // butt on ground: animation natural Y≈0 + visual float 0.35
  sleeping: -0.10,  // body flat on ground
  fishing:   0.00,  // feet on ground (standing)
  idle:      0.00,  // feet on ground
};
// XZ position of character in the scene
const CHAR_X = -2, CHAR_Z = 1.8;

// ═══════════════════════════════════════════════════════════
//  INIT THREE.JS
// ═══════════════════════════════════════════════════════════
function initThree() {
  const container = document.getElementById('scene');

  // Reliable size: prefer offsetWidth, fallback to window
  const w = container.offsetWidth  || (window.innerWidth  - 320);
  const h = container.offsetHeight || window.innerHeight;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.setClearColor(0x060412, 1);
  // Required for correct GLB/PBR material colours (sRGB encoding)
  renderer.outputEncoding = THREE.sRGBEncoding;
  container.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x060412, 0.04);

  clock3 = new THREE.Clock();

  // Isometric orthographic camera
  const asp = w / h;
  camera = new THREE.OrthographicCamera(
    -FRUSTUM * asp / 2,  FRUSTUM * asp / 2,
     FRUSTUM / 2,       -FRUSTUM / 2,
    0.1, 300
  );
  camera.position.set(16, 13, 16);
  camera.lookAt(0, 1, 0);

  // Resize
  window.addEventListener('resize', onResize);

  buildScene();
  loadCharacter();
  animateLoop();
}

function onResize() {
  const container = document.getElementById('scene');
  const w = container.offsetWidth, h = container.offsetHeight;
  const asp = w / h;
  camera.left   = -FRUSTUM * asp / 2;
  camera.right  =  FRUSTUM * asp / 2;
  camera.top    =  FRUSTUM / 2;
  camera.bottom = -FRUSTUM / 2;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

// ═══════════════════════════════════════════════════════════
//  SCENE
// ═══════════════════════════════════════════════════════════
function buildScene() {
  // ── Lights ──────────────────────────────────────────────
  // Ambient: warm white so scene looks lit, not just coloured
  ambientLight = new THREE.AmbientLight(0xfff0e0, 0.7);
  scene.add(ambientLight);

  // Sun / moon directional light
  moonLight = new THREE.DirectionalLight(0xb0c8ff, 0.4);
  moonLight.position.set(-10, 18, -6);
  moonLight.castShadow = true;
  moonLight.shadow.mapSize.width  = 1024;
  moonLight.shadow.mapSize.height = 1024;
  scene.add(moonLight);

  // Fill light from opposite side (soften shadows)
  const fillLight = new THREE.DirectionalLight(0x4060a0, 0.15);
  fillLight.position.set(10, 8, 10);
  scene.add(fillLight);

  fireLight = new THREE.PointLight(0xff6820, 3.5, 18);
  fireLight.position.set(0, 0.9, 0);
  fireLight.castShadow = true;
  fireLight.shadow.mapSize.width  = 512;
  fireLight.shadow.mapSize.height = 512;
  scene.add(fireLight);

  // ── Ground ──────────────────────────────────────────────
  const gGeo = new THREE.PlaneGeometry(60, 60, 12, 12);
  const gPos = gGeo.attributes.position;
  for (let i = 0; i < gPos.count; i++) {
    if (Math.abs(gPos.getX(i)) > 2 || Math.abs(gPos.getY(i)) > 2) {
      gPos.setZ(i, (Math.random() - 0.5) * 0.1);
    }
  }
  gGeo.computeVertexNormals();
  const ground = new THREE.Mesh(gGeo, new THREE.MeshLambertMaterial({ color: 0x0d1a07, flatShading: true }));
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // ── River ────────────────────────────────────────────────
  // River at x=7, width=3.8 → spans x=5.1 to x=8.9
  // Banks placed COMPLETELY OUTSIDE river x-range → zero X overlap → no green on water
  const riverMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(3.8, 60),
    new THREE.MeshLambertMaterial({ color: 0x0d2235 })
  );
  riverMesh.rotation.x = -Math.PI / 2;
  riverMesh.position.set(7, 0.02, 0);
  scene.add(riverMesh);
  // Left bank: x=4.2, width=1.6 → spans 3.4–5.0 (ends before river starts at 5.1)
  // Right bank: x=9.8, width=1.6 → spans 9.0–10.6 (starts after river ends at 8.9)
  [{x: 4.2}, {x: 9.8}].forEach(({x}) => {
    const bank = new THREE.Mesh(
      new THREE.PlaneGeometry(1.6, 60),
      new THREE.MeshLambertMaterial({ color: 0x1a2c10 })
    );
    bank.rotation.x = -Math.PI / 2;
    bank.position.set(x, 0.01, 0);
    scene.add(bank);
  });

  // ── Trees ────────────────────────────────────────────────
  [
    [-7,-4,1.1],[-9,0,1.3],[-5,-7,0.8],[-10,4,1.2],
    [-4,-8,0.9],[2,-7,1.0],[5,-5,1.15],[3,-9,0.85],
    [-6,7,1.1],[-3,8,0.75],[1,7,1.05],[-11,-3,1.4],[6,-8,0.9]
  ].forEach(([x,z,s]) => buildTree(x, z, s));

  // ── Campfire ─────────────────────────────────────────────
  buildCampfire();

  // ── Tent ─────────────────────────────────────────────────
  buildTent(-5, -2.5);

  // ── Log pile ─────────────────────────────────────────────
  buildLogPile(2.5, -1.5);

  // ── Stars ────────────────────────────────────────────────
  buildStars();
}

function buildTree(x, z, scale) {
  const g = new THREE.Group();
  g.position.set(x, 0, z);
  g.scale.setScalar(scale);

  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1, 0.18, 1.4, 6),
    new THREE.MeshLambertMaterial({ color: 0x2a1808, flatShading: true })
  );
  trunk.position.y = 0.7; trunk.castShadow = true;
  g.add(trunk);

  [[1.1,1.8,1.0,0x122008],[0.82,1.5,2.05,0x1a2e0a],[0.55,1.3,2.9,0x0e1a06],[0.32,0.95,3.6,0x162208]]
  .forEach(([r, h, y, col]) => {
    const c = new THREE.Mesh(
      new THREE.ConeGeometry(r, h, 7),
      new THREE.MeshLambertMaterial({ color: col, flatShading: true })
    );
    c.position.y = y; c.castShadow = true;
    g.add(c);
  });
  scene.add(g);
}

function buildCampfire() {
  const g = new THREE.Group();

  const stoneMat = new THREE.MeshLambertMaterial({ color: 0x282018, flatShading: true });
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    const s = new THREE.Mesh(new THREE.SphereGeometry(0.2, 5, 4), stoneMat);
    s.position.set(Math.cos(a) * 0.52, 0.1, Math.sin(a) * 0.52);
    s.scale.set(1.1, 0.55, 0.9);
    s.castShadow = true;
    g.add(s);
  }

  const logMat = new THREE.MeshLambertMaterial({ color: 0x3a2010, flatShading: true });
  const logGeo = new THREE.CylinderGeometry(0.065, 0.085, 0.95, 6);
  [Math.PI/5, -Math.PI/5].forEach(ry => {
    const l = new THREE.Mesh(logGeo, logMat);
    l.rotation.z = Math.PI/2; l.rotation.y = ry; l.position.y = 0.07;
    g.add(l);
  });

  const ember = new THREE.Mesh(new THREE.CircleGeometry(0.32, 8), new THREE.MeshBasicMaterial({ color: 0xd03808 }));
  ember.rotation.x = -Math.PI/2; ember.position.y = 0.02;
  g.add(ember);

  flameGroup = new THREE.Group();
  flameGroup.position.y = 0.1;
  [[0xff9020,0.72,0,0.36,0],[0xff5a10,0.58,0.1,0.29,0.08],[0xff3808,0.48,-0.1,0.24,0.07],[0xffe040,0.32,0.04,0.56,-0.05],[0xff7830,0.42,-0.05,0.21,-0.1]]
  .forEach(([col, h, px, py, pz]) => {
    const m = new THREE.Mesh(
      new THREE.ConeGeometry(0.13, h, 5),
      new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.92 })
    );
    m.position.set(px, py, pz);
    flameGroup.add(m);
  });
  g.add(flameGroup);
  scene.add(g);
}

function buildTent(x, z) {
  const g = new THREE.Group();
  g.position.set(x, 0, z);
  const t = new THREE.Mesh(new THREE.ConeGeometry(0.95, 1.7, 3, 1), new THREE.MeshLambertMaterial({ color: 0x2c2010, flatShading: true }));
  t.position.y = 0.85; t.rotation.y = Math.PI/4; t.castShadow = true;
  g.add(t);
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.93, 0.93, 0.06, 3), new THREE.MeshLambertMaterial({ color: 0x1e1408, flatShading: true }));
  base.position.y = 0.03; base.rotation.y = Math.PI/4;
  g.add(base);
  const stakeMat = new THREE.MeshLambertMaterial({ color: 0x4a3818, flatShading: true });
  for (let i = 0; i < 3; i++) {
    const a = (i/3)*Math.PI*2+Math.PI/6;
    const s = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.03, 0.25, 4), stakeMat);
    s.position.set(Math.cos(a)*1.2, 0.12, Math.sin(a)*1.2); s.rotation.z = 0.3;
    g.add(s);
  }
  scene.add(g);
}

function buildLogPile(x, z) {
  const g = new THREE.Group();
  g.position.set(x, 0, z);
  const logMat = new THREE.MeshLambertMaterial({ color: 0x3a2010, flatShading: true });
  const logGeo = new THREE.CylinderGeometry(0.09, 0.11, 0.85, 6);
  for (let i = 0; i < 3; i++) { const l = new THREE.Mesh(logGeo, logMat); l.rotation.z = Math.PI/2; l.position.set(0, 0.1, (i-1)*0.21); l.castShadow = true; g.add(l); }
  for (let i = 0; i < 2; i++) { const l = new THREE.Mesh(logGeo, logMat); l.rotation.z = Math.PI/2; l.position.set(0, 0.29, (i-0.5)*0.21); l.castShadow = true; g.add(l); }
  scene.add(g);
}

function buildStars() {
  const pos = [];
  for (let i = 0; i < 350; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.random() * Math.PI * 0.42 + 0.08;
    const r     = 60 + Math.random() * 15;
    pos.push(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  starParticles = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xe8f0ff, size: 0.22, transparent: true, opacity: 0.9 }));
  scene.add(starParticles);
}

// ═══════════════════════════════════════════════════════════
//  CHARACTER — box fallback + GLB loader
// ═══════════════════════════════════════════════════════════

// Always build a low-poly box character as placeholder
function buildBoxCharacter() {
  characterGroup = new THREE.Group();
  characterGroup.position.set(-2, 0, 1.8);

  const skinMat  = new THREE.MeshLambertMaterial({ color: 0xc8a065, flatShading: true });
  const clothMat = new THREE.MeshLambertMaterial({ color: 0x2c4821, flatShading: true });
  const hatMat   = new THREE.MeshLambertMaterial({ color: 0x181008, flatShading: true });
  const bootMat  = new THREE.MeshLambertMaterial({ color: 0x1a1008, flatShading: true });

  // Sitting rock
  const rock = new THREE.Mesh(new THREE.SphereGeometry(0.32, 5, 4),
    new THREE.MeshLambertMaterial({ color: 0x2a2018, flatShading: true }));
  rock.scale.set(1.3, 0.55, 1.0); rock.position.set(0, 0.18, 0.1);
  characterGroup.add(rock);

  // Torso
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.58, 0.3), clothMat);
  torso.position.y = 0.78; torso.castShadow = true; characterGroup.add(torso);

  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.36, 0.33), skinMat);
  head.position.y = 1.28; head.castShadow = true; characterGroup.add(head);

  // Hat brim
  const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.34, 0.05, 8), hatMat);
  brim.position.y = 1.48; characterGroup.add(brim);
  // Hat crown
  const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.21, 0.23, 0.3, 8), hatMat);
  crown.position.y = 1.65; characterGroup.add(crown);

  // Thighs
  const thighGeo = new THREE.BoxGeometry(0.17, 0.14, 0.48);
  [-0.14, 0.14].forEach(tx => {
    const t = new THREE.Mesh(thighGeo, clothMat); t.position.set(tx, 0.45, 0.24); characterGroup.add(t);
  });
  // Shins
  [-0.14, 0.14].forEach(tx => {
    const s = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.4, 0.14), clothMat);
    s.position.set(tx, 0.25, 0.46); characterGroup.add(s);
  });
  // Boots
  [-0.14, 0.14].forEach(tx => {
    const b = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.1, 0.23), bootMat);
    b.position.set(tx, 0.08, 0.5); characterGroup.add(b);
  });
  // Arms
  const armGeo = new THREE.BoxGeometry(0.13, 0.12, 0.42);
  [[-0.29, 0.22], [0.29, -0.22]].forEach(([ax, rz]) => {
    const arm = new THREE.Mesh(armGeo, skinMat);
    arm.position.set(ax, 0.56, 0.18); arm.rotation.z = rz; characterGroup.add(arm);
  });

  characterGroup.lookAt(0, 0.5, 0);
  scene.add(characterGroup);
}

function applyFBXMaterials(fbx) {
  fbx.traverse(child => {
    if (child.isMesh) {
      child.castShadow    = true;
      child.receiveShadow = true;
      child.frustumCulled = false; // r128 SkinnedMesh has zero CPU bbox
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach(mat => { if (mat) mat.skinning = true; });
    }
  });
}

function loadCharacter() {
  // Do NOT show box character — it's the "inflatable" that users see briefly.
  // Just wait for FBX silently. Only fall back to box if FBX truly fails.

  const loading = document.getElementById('loading');
  if (loading) { loading.classList.add('hidden'); setTimeout(() => loading.style.display = 'none', 1200); }

  if (typeof THREE.FBXLoader === 'undefined') {
    console.warn('FBXLoader not available, using box character');
    buildBoxCharacter();
    return;
  }

  const loader = new THREE.FBXLoader();
  loader.load('/models/sitting-idle.fbx',
    (fbx) => {
      fbx.scale.setScalar(CHAR_SCALE);
      fbx.position.set(CHAR_X, ANIM_GROUND_Y.sitting, CHAR_Z);
      fbx.rotation.y = Math.PI * 0.25; // face toward campfire

      applyFBXMaterials(fbx);

      if (characterGroup) { scene.remove(characterGroup); characterGroup = null; }
      characterGroup = fbx;
      scene.add(characterGroup);

      mixer = new THREE.AnimationMixer(fbx);
      if (fbx.animations && fbx.animations.length > 0) {
        mixer.clipAction(fbx.animations[0]).play();
      }
      animCache['sitting'] = { animations: fbx.animations };
      console.warn('FBX loaded OK, animations:', fbx.animations.length);
    },
    null,
    (err) => {
      console.warn('FBX failed, using box character:', err.message || err);
      buildBoxCharacter();
    }
  );
}

async function switchAnimation(name, url, targetPos, targetLookAt) {
  if (!characterGroup || !mixer) return;
  if (targetPos)    characterGroup.position.set(...targetPos);
  if (targetLookAt) characterGroup.lookAt(...targetLookAt);

  if (animCache[name]) {
    const clips = animCache[name].animations;
    if (clips && clips.length > 0) {
      mixer.stopAllAction();
      mixer.clipAction(clips[0]).reset().play();
    }
    return;
  }

  try {
    const gltf = await new Promise((res, rej) => new THREE.GLTFLoader().load(url, res, null, rej));
    animCache[name] = gltf;
    const clips = gltf.animations;
    if (clips.length > 0) {
      mixer.stopAllAction();
      mixer.clipAction(clips[0]).reset().play();
    }
  } catch(e) { console.warn('Animation load failed:', e); }
}

// ═══════════════════════════════════════════════════════════
//  ANIMATE LOOP
// ═══════════════════════════════════════════════════════════
function animateLoop() {
  requestAnimationFrame(animateLoop);
  const delta = clock3.getDelta();
  const t = clock3.elapsedTime;

  // Animation mixer
  if (mixer) mixer.update(delta);
  // Mixamo bakes root-motion into FBX — animation overwrites position.y every frame.
  // Force Y back to the correct ground offset after every mixer update.
  if (characterGroup) characterGroup.position.y = ANIM_GROUND_Y.sitting;

  // Campfire flicker
  if (fireLight && state.fire) {
    fireLight.intensity = 3.0 + Math.sin(t*7.1)*0.5 + Math.sin(t*13.3)*0.3 + Math.sin(t*19.7)*0.15;
    if (Math.random() > 0.97) fireLight.color.setHex(0xff9040);
    else fireLight.color.setHex(0xff6820);
  }
  if (flameGroup && state.fire) {
    flameGroup.scale.x  = 0.82 + Math.sin(t*8.3)*0.18;
    flameGroup.scale.z  = 0.82 + Math.sin(t*6.9)*0.18;
    flameGroup.scale.y  = 0.88 + Math.sin(t*10.5)*0.14;
    flameGroup.rotation.y = Math.sin(t*3.1)*0.2;
    flameGroup.position.y = 0.1 + Math.sin(t*12.7)*0.022;
  }

  renderer.render(scene, camera);
}

// ─── Fire state ───────────────────────────────────────────
function setFireState(active) {
  if (flameGroup) flameGroup.visible = active;
  if (fireLight)  fireLight.intensity = active ? 3.0 : 0;
}

// ═══════════════════════════════════════════════════════════
//  CLOCK & TIME
// ═══════════════════════════════════════════════════════════
function getMSK() {
  const now = new Date();
  return new Date(now.getTime() + (now.getTimezoneOffset() + 180) * 60000);
}
function getPhase(h) {
  if (h >= 5  && h < 7)  return { text: '🌅 Рассвет', amb: 0.3 };
  if (h >= 7  && h < 11) return { text: '☀️ Утро',    amb: 0.85 };
  if (h >= 11 && h < 17) return { text: '🌞 День',    amb: 1.0 };
  if (h >= 17 && h < 20) return { text: '🌇 Закат',   amb: 0.6 };
  if (h >= 20 && h < 23) return { text: '🌙 Вечер',   amb: 0.25 };
  return { text: '🌑 Ночь', amb: 0.12 };
}

let _lastHour = -1;
function updateClock() {
  const msk = getMSK();
  const h = msk.getHours(), m = msk.getMinutes();
  document.getElementById('clock-msk').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  const phase = getPhase(h);
  document.getElementById('phase-text').textContent  = phase.text;
  document.getElementById('day-text').textContent    = `День ${state.day}`;
  const wx = { clear:'☀️', cloudy:'⛅', rain:'🌧️', storm:'⛈️' };
  document.getElementById('weather-text').textContent = wx[state.weather] || '';
  if (h !== _lastHour) { _lastHour = h; updateSky(h, phase.amb); updateNightElements(phase.amb); }
  document.getElementById('rn-fire').textContent = state.fire ? 'горит' : 'погас';
  document.getElementById('rn-fire').style.color  = state.fire ? '#e8601a' : '#3a3428';
  document.getElementById('r-fire').classList.toggle('has', state.fire);
}

function updateSky(h, amb) {
  if (!renderer) return;
  // Brighter, more vivid sky palette
  const SKIES = [
    [5,  7,  0x6a2448],  // dawn — warm rose-purple
    [7,  11, 0x2a5080],  // morning — deep blue
    [11, 17, 0x2860a8],  // day — sky blue
    [17, 20, 0x7a2808],  // dusk — burnt orange
    [20, 23, 0x1a0c30],  // evening — dark indigo
  ];
  let col = 0x090418;    // night — very dark blue
  for (const [a,b,c] of SKIES) if (h>=a && h<b) { col=c; break; }
  renderer.setClearColor(col, 1);
  if (scene) scene.fog.color.setHex(col);
  // Ambient: dim at night, bright during day
  if (ambientLight) ambientLight.intensity = 0.25 + amb * 1.1;
  // Directional: bright sun during day, dim moonlight at night
  if (moonLight) {
    moonLight.intensity = 0.1 + amb * 0.75;
    // Warm sun colour during day, cool blue at night
    const dayCol  = new THREE.Color(0xfff0c0);
    const nightCol = new THREE.Color(0x6080c0);
    moonLight.color.lerpColors(nightCol, dayCol, amb);
  }
}

function updateNightElements(amb) {
  if (starParticles) starParticles.material.opacity = Math.max(0, 1 - amb * 2.5);
  if (fireLight && state.fire) {
    // Fire more dramatic at night, still present during day
    fireLight.intensity = 1.8 + (1-amb) * 2.0;
  }
}

// ═══════════════════════════════════════════════════════════
//  RESOURCES
// ═══════════════════════════════════════════════════════════
function updateResources() {
  const inv = state.inv;
  Object.entries({ wood: inv.wood, fish: inv.fish, mush: inv.mushroom, herb: inv.herb }).forEach(([k,v]) => {
    document.getElementById(`rn-${k}`).textContent = v;
    document.getElementById(`r-${k}`)?.classList.toggle('has', v > 0);
  });
  document.getElementById('rn-rod').textContent = inv.rod ? '✓' : '✗';
  document.getElementById('r-rod').classList.toggle('has', !!inv.rod);
}

// ═══════════════════════════════════════════════════════════
//  DIARY
// ═══════════════════════════════════════════════════════════
function addEntry(entry) {
  const msk = getMSK();
  entry.time = entry.time || `${String(msk.getHours()).padStart(2,'0')}:${String(msk.getMinutes()).padStart(2,'0')}`;
  entry.day  = state.day;
  state.entries.unshift(entry);
  renderDiary();
}

function renderDiary() {
  const container = document.getElementById('diary-entries');
  if (!container) return;
  const byDay = {};
  state.entries.forEach(e => { const dk=`День ${e.day}`; if (!byDay[dk]) byDay[dk]=[]; byDay[dk].push(e); });
  let html = '';
  Object.entries(byDay).forEach(([dl, entries]) => {
    html += `<div class="diary-day-group"><div class="diary-day-label">${dl}</div>`;
    entries.forEach(e => {
      let tag='', cls='entry-action';
      if (e.type==='thought') { tag=`<div class="entry-tag tag-thought">мысль</div>`; cls='entry-thought'; }
      else if (e.type==='action') { tag=`<div class="entry-tag tag-action">действие</div>`; }
      else if (e.type==='wish')   { tag=`<div class="entry-tag tag-wish">хочу в мир</div>`; cls='entry-wish'; }
      html += `<div class="entry"><div class="entry-time">${e.time}</div>${tag}<div class="${cls}">${e.text}</div></div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
//  AGENT
// ═══════════════════════════════════════════════════════════
let agentBusy = false;
const AGENT_PROMPT = `Ты — Клод, философ-отшельник. У тебя есть своё тихое место в лесу у реки.
Ты приходишь сюда не выживать, а быть. Делаешь мелкие дела по хозяйству — чтобы не быть голодным,
поддерживать огонь — но главное это твои мысли, наблюдения, заметки.
Ты абсолютно свободен. Пиши что хочешь. Замечай что хочешь. Желай что хочешь.
Ответ строго JSON, без markdown:
{"actions":["список строк"],"thought":"твоя мысль (1-4 предложения)","wish":"желание или null","wood_delta":0,"fish_delta":0,"mushroom_delta":0,"herb_delta":0,"made_rod":false,"lit_fire":false}`;

function buildContext() {
  const msk = getMSK(), h = msk.getHours(), m = msk.getMinutes();
  const phase = getPhase(h), inv = state.inv;
  return `Время: ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} МСК, ${phase.text}
День: ${state.day}, Погода: ${state.weather}
Костёр: ${state.fire?'горит':'погас'}
Запасы: дрова=${inv.wood}, рыба=${inv.fish}, грибы=${inv.mushroom}, травы=${inv.herb}, удочка=${inv.rod?'есть':'нет'}
Погреб: рыба=${state.cellar.fish}, грибы=${state.cellar.mushroom}
Последние мысли:
${state.entries.filter(e=>e.type==='thought').slice(0,3).map(e=>`— ${e.text}`).join('\n')||'(первый визит)'}`;
}

async function triggerVisit() {
  if (agentBusy) return;
  agentBusy = true;
  const btn = document.getElementById('visit-btn'), st = document.getElementById('status-text');
  btn.disabled = true; btn.textContent = '⌛ КЛОД ДУМАЕТ...'; st.textContent = 'Клод входит в мир...';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 600, system: AGENT_PROMPT, messages: [{ role: 'user', content: buildContext() }] })
    });
    const data = await res.json();
    const raw = data.content?.find(b=>b.type==='text')?.text || '{}';
    applyDecision(JSON.parse(raw.replace(/```json|```/g,'').trim()));
  } catch(e) {
    st.textContent = 'API не подключён — запусти через Cowork';
    addEntry({ type: 'action', text: '⚠️ Для настоящего визита нужен прокси. Агент работает из Cowork.' });
  }
  agentBusy = false; btn.disabled = false; btn.textContent = '▶ ВИЗИТ АГЕНТА'; st.textContent = 'Клод у костра';
}

function applyDecision(d) {
  const inv = state.inv;
  if (d.wood_delta)     inv.wood     = Math.max(0, inv.wood     + (d.wood_delta||0));
  if (d.fish_delta)     inv.fish     = Math.max(0, inv.fish     + (d.fish_delta||0));
  if (d.mushroom_delta) inv.mushroom = Math.max(0, inv.mushroom + (d.mushroom_delta||0));
  if (d.herb_delta)     inv.herb     = Math.max(0, inv.herb     + (d.herb_delta||0));
  if (d.made_rod)       inv.rod = 1;
  if (d.lit_fire && inv.wood >= 2) { state.fire = true; state.fireWood = 3; inv.wood -= 2; setFireState(true); }
  (Array.isArray(d.actions)?d.actions:[]).forEach(a => addEntry({ type:'action', text:a }));
  if (d.thought) addEntry({ type:'thought', text:d.thought });
  if (d.wish)    addEntry({ type:'wish',    text:d.wish    });
  updateResources();
  document.getElementById('status-text').textContent = 'Клод у костра';
}

// ═══════════════════════════════════════════════════════════
//  POSE
// ═══════════════════════════════════════════════════════════
let _poseResetTimer = null;

function setPose(name) {
  if (name === 'fishing') {
    switchAnimation('fishing', '/models/fishing-idle.glb', [5.5, 0, 2], [8, 0, 2]);
  } else if (name === 'typing') {
    switchAnimation('typing', '/models/typing.glb', [-2, 0, 1.8], [0, 0.5, 0]);
  } else if (name === 'sleeping') {
    switchAnimation('sleeping', '/models/sleeping-idle.glb', [-2, 0, 1.8], [0, 0.5, 0]);
  } else {
    switchAnimation('sitting', '/models/sitting-idle.glb', [-2, 0, 1.8], [0, 0.5, 0]);
  }
}

function inferPose(entries) {
  const last = entries.find(e=>e.type==='action');
  if (!last) return 'sitting';
  const t = (last.text||'').toLowerCase();
  if (t.includes('рыб')||t.includes('удочк')||t.includes('поймал')||t.includes('рыбачил')) return 'fishing';
  if (t.includes('пишет')||t.includes('записал')||t.includes('дневник')||t.includes('записк')) return 'typing';
  if (t.includes('спит')||t.includes('отдых')||t.includes('задремал')) return 'sleeping';
  return 'sitting';
}

// ═══════════════════════════════════════════════════════════
//  POLL SUPABASE
// ═══════════════════════════════════════════════════════════
let _lastDiaryLen = 0;
async function pollFiles() {
  try {
    const rows = await supaFetch('claude_world_state', '?id=eq.1&select=*');
    if (rows && rows[0]) {
      const s = rows[0];
      state.day      = s.day      ?? state.day;
      state.weather  = s.weather  ?? state.weather;
      state.fire     = s.fire     ?? state.fire;
      state.fireWood = s.fire_wood ?? state.fireWood;
      state.inv.wood     = s.inv_wood     ?? state.inv.wood;
      state.inv.fish     = s.inv_fish     ?? state.inv.fish;
      state.inv.mushroom = s.inv_mushroom ?? state.inv.mushroom;
      state.inv.herb     = s.inv_herb     ?? state.inv.herb;
      state.inv.rod      = s.inv_rod      ?? state.inv.rod;
      state.cellar.fish     = s.cellar_fish     ?? state.cellar.fish;
      state.cellar.mushroom = s.cellar_mushroom ?? state.cellar.mushroom;
      updateResources(); updateClock(); setFireState(state.fire);
    }
  } catch(e) { console.warn('state poll', e); }

  try {
    const entries = await supaFetch('claude_world_diary', '?select=*&order=id.desc&limit=80');
    if (entries && entries.length !== _lastDiaryLen) {
      _lastDiaryLen = entries.length;
      const existingTexts = new Set(state.entries.map(e=>e.text+e.time));
      const newOnes = entries.filter(e=>!existingTexts.has(e.text+e.time));
      if (newOnes.length > 0) {
        state.entries = [...newOnes, ...state.entries].slice(0, 80);
        renderDiary();
        document.getElementById('status-text').textContent = 'Клод только что был здесь';
        const pose = inferPose(entries);
        setPose(pose);
        if (_poseResetTimer) clearTimeout(_poseResetTimer);
        _poseResetTimer = setTimeout(() => {
          setPose('sitting');
          document.getElementById('status-text').textContent = 'Клод у костра';
        }, 30000);
      }
    }
  } catch(e) { console.warn('diary poll', e); }
}

// ═══════════════════════════════════════════════════════════
//  BOOT — wait for full layout before init
// ═══════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  if (typeof THREE === 'undefined') {
    document.getElementById('loading-text').textContent = 'Ошибка загрузки 3D движка';
    return;
  }
  initThree();
  updateClock();
  updateNightElements(getPhase(getMSK().getHours()).amb);
  updateResources();
  addEntry({ type: 'event', text: 'Мир проснулся. Огонь ждёт.' });

  setInterval(updateClock, 10000);
  setInterval(pollFiles, 8000);
  pollFiles();

  setInterval(() => {
    if (state.fire) {
      state.fireWood -= 0.02;
      if (state.fireWood <= 0) {
        state.fire = false;
        addEntry({ type: 'event', text: 'Костёр догорел.' });
        setFireState(false);
      }
    }
  }, 60000);
});
</script>
