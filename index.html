<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Клод у костра</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ember:     #e8601a;
  --gold:      #c8943a;
  --gold-pale: #e8c878;
  --text:      #d4c8a8;
  --text-dim:  #7a6e58;
  --text-faint:#3a3428;
  --panel-bg:  rgba(8,6,4,0.96);
  --border:    rgba(140,100,40,0.2);
}
html, body { width: 100%; height: 100%; overflow: hidden; background: #060412; }
body { font-family: 'Cormorant Garamond', Georgia, serif; color: var(--text); display: flex; }

/* ── Scene ── */
#scene { flex: 1; position: relative; overflow: hidden; }
#scene canvas { display: block; }

/* ── Loading overlay ── */
#loading {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #060412; z-index: 5; pointer-events: none;
  transition: opacity 1s ease;
}
#loading.hidden { opacity: 0; }
#loading-text {
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px;
  color: var(--gold); opacity: 0.6; margin-top: 16px;
}
.loading-dots::after {
  content: ''; animation: dots 1.5s steps(4, end) infinite;
}
@keyframes dots {
  0%, 100% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; }
}

/* ── Diary Panel ── */
#diary-panel {
  width: 320px; min-width: 320px;
  background: var(--panel-bg); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100vh;
  position: relative; z-index: 10;
}
#diary-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#diary-title {
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase; opacity: 0.7; margin-bottom: 6px;
}
#clock-line { display: flex; align-items: baseline; gap: 10px; }
#clock-msk {
  font-family: 'Cinzel', serif; font-size: 26px; color: var(--gold-pale);
  font-weight: 500; text-shadow: 0 0 20px rgba(200,148,58,0.4); letter-spacing: 2px;
}
#clock-sub { font-size: 13px; color: var(--text-dim); font-style: italic; }
#phase-line { margin-top: 6px; font-size: 13px; color: var(--text-dim); display: flex; gap: 12px; }

#resources {
  padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  display: flex; flex-wrap: wrap; gap: 6px 14px;
}
.res-chip { font-size: 15px; color: var(--text-dim); display: flex; align-items: center; gap: 4px; transition: color .3s; }
.res-chip.has { color: var(--text); }
.res-n { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); min-width: 16px; }

#diary-scroll { flex: 1; overflow-y: auto; padding: 0; scrollbar-width: thin; scrollbar-color: #3a2a10 transparent; }
#diary-scroll::-webkit-scrollbar { width: 3px; }
#diary-scroll::-webkit-scrollbar-thumb { background: #3a2a10; }

.diary-day-group { padding: 16px 20px; border-bottom: 1px solid rgba(60,40,10,0.4); }
.diary-day-label {
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px;
  color: var(--text-faint); text-transform: uppercase; margin-bottom: 12px;
}
.entry { margin-bottom: 16px; animation: entryIn .5s ease forwards; opacity: 0; }
@keyframes entryIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.entry-time { font-size: 11px; color: var(--text-faint); letter-spacing: 1px; margin-bottom: 4px; }
.entry-thought { font-size: 18px; line-height: 1.6; color: var(--text); font-style: italic; }
.entry-action { font-size: 16px; color: var(--text-dim); line-height: 1.5; padding-left: 10px; border-left: 2px solid rgba(140,100,40,0.25); }
.entry-wish { font-size: 16px; color: #8a9870; line-height: 1.5; font-style: italic; }
.entry-wish::before { content: '✦ '; color: #5a7040; font-size: 11px; }
.entry-tag { display: inline-block; font-size: 10px; font-family: 'Cinzel', serif; letter-spacing: 1px; padding: 2px 7px; border-radius: 2px; margin-bottom: 5px; }
.tag-thought { background: rgba(200,148,58,0.1); color: var(--gold); border: 1px solid rgba(200,148,58,0.2); }
.tag-action  { background: rgba(100,140,80,0.1); color: #8aaa68; border: 1px solid rgba(100,140,80,0.2); }
.tag-wish    { background: rgba(80,100,160,0.1); color: #8090c0; border: 1px solid rgba(80,100,160,0.2); }

#agent-status { padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
#status-action { font-size: 15px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
#status-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--ember);
  animation: dotPulse 2s ease-in-out infinite; flex-shrink: 0;
}
@keyframes dotPulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
#status-text { font-style: italic; }
#visit-btn {
  display: block; width: 100%; margin-top: 10px; padding: 8px;
  background: rgba(200,148,58,0.08); border: 1px solid rgba(200,148,58,0.25);
  color: var(--gold); font-family: 'Cinzel', serif; font-size: 10px;
  letter-spacing: 2px; cursor: pointer; transition: all .2s;
}
#visit-btn:hover { background: rgba(200,148,58,0.15); border-color: rgba(200,148,58,0.5); color: var(--gold-pale); }
#visit-btn:disabled { opacity: .4; cursor: default; }
</style>
</head>
<body>

<div id="scene">
  <div id="loading">
    <svg width="40" height="40" viewBox="0 0 40 40" style="animation: spin 1.2s linear infinite;">
      <circle cx="20" cy="20" r="16" fill="none" stroke="#c8943a" stroke-width="1.5" stroke-opacity="0.3"/>
      <circle cx="20" cy="20" r="16" fill="none" stroke="#e8601a" stroke-width="1.5"
        stroke-dasharray="25 75" stroke-linecap="round">
      </circle>
    </svg>
    <div id="loading-text">КЛОД ВХОДИТ В МИР<span class="loading-dots"></span></div>
  </div>
</div>

<div id="diary-panel">
  <div id="diary-header">
    <div id="diary-title">Дневник отшельника</div>
    <div id="clock-line">
      <span id="clock-msk">--:--</span>
      <span id="clock-sub">МСК</span>
    </div>
    <div id="phase-line">
      <span id="phase-text">—</span>
      <span id="day-text" style="color:var(--text-faint)">День 1</span>
      <span id="weather-text">—</span>
    </div>
  </div>
  <div id="resources">
    <div class="res-chip" id="r-wood">🪵 <span class="res-n" id="rn-wood">0</span></div>
    <div class="res-chip" id="r-fish">🐟 <span class="res-n" id="rn-fish">0</span></div>
    <div class="res-chip" id="r-mush">🍄 <span class="res-n" id="rn-mush">0</span></div>
    <div class="res-chip" id="r-herb">🌿 <span class="res-n" id="rn-herb">0</span></div>
    <div class="res-chip" id="r-rod" title="Удочка">🎣 <span class="res-n" id="rn-rod">✗</span></div>
    <div class="res-chip" id="r-fire" title="Костёр">🔥 <span class="res-n" id="rn-fire" style="font-size:10px">погас</span></div>
  </div>
  <div id="diary-scroll"><div id="diary-entries"></div></div>
  <div id="agent-status">
    <div id="status-action">
      <div id="status-dot"></div>
      <span id="status-text">ожидает визита...</span>
    </div>
    <button id="visit-btn" onclick="triggerVisit()">▶ ВИЗИТ АГЕНТА</button>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fflate@0.6.10/umd/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  SUPABASE
// ═══════════════════════════════════════════════════════════
const SUPA_URL = 'https://zhngimueiubiwixnqmpt.supabase.co';
const SUPA_KEY = 'sb_publishable_dngGHGRs5qz5Z8BgxUAtzQ_vpXbi5q4';

async function supaFetch(table, params = '') {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}${params}`, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  });
  if (!r.ok) throw new Error('Supabase Fetch ' + r.status);
  return r.json();
}

async function supaUpdate(table, id, data) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'PATCH',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) console.error('Supabase Update Error:', await r.text());
}

async function supaInsert(table, data) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) console.error('Supabase Insert Error:', await r.text());
}

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const state = {
  day: 1, weather: 'clear', fire: true, fireWood: 3,
  inv: { wood: 2, fish: 0, mushroom: 0, herb: 0, rod: 0 },
  cellar: { fish: 0, mushroom: 0 },
  entries: [], lastVisit: null,
};

// ═══════════════════════════════════════════════════════════
//  THREE.JS GLOBALS
// ═══════════════════════════════════════════════════════════
let renderer, scene, camera, clock3;
let ambientLight, moonLight, fireLight;
let starParticles, flameGroup;
let characterGroup, mixer;
const animCache = {};
const FRUSTUM = 11;

const CHAR_SCALE = 0.011;
const ANIM_GROUND_Y = { sitting: -0.15, sleeping: -0.15, fishing: 0.15, idle: 0.00 }; 
const CHAR_X = -2, CHAR_Z = 1.8;

// ═══════════════════════════════════════════════════════════
//  INIT THREE.JS
// ═══════════════════════════════════════════════════════════
function initThree() {
  const container = document.getElementById('scene');
  const w = container.offsetWidth || (window.innerWidth - 320);
  const h = container.offsetHeight || window.innerHeight;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.setClearColor(0x060412, 1);
  renderer.outputEncoding = THREE.sRGBEncoding;
  container.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x060412, 0.04);
  clock3 = new THREE.Clock();

  const asp = w / h;
  camera = new THREE.OrthographicCamera(
    -FRUSTUM * asp / 2, FRUSTUM * asp / 2,
    FRUSTUM / 2, -FRUSTUM / 2,
    0.1, 300
  );
  camera.position.set(16, 13, 16);
  camera.lookAt(0, 1, 0);

  window.addEventListener('resize', onResize);
  buildScene();
  loadCharacter();
  animateLoop();
}

function onResize() {
  const container = document.getElementById('scene');
  const w = container.offsetWidth, h = container.offsetHeight;
  const asp = w / h;
  camera.left = -FRUSTUM * asp / 2;
  camera.right = FRUSTUM * asp / 2;
  camera.top = FRUSTUM / 2;
  camera.bottom = -FRUSTUM / 2;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

function buildScene() {
  ambientLight = new THREE.AmbientLight(0xfff0e0, 0.7);
  scene.add(ambientLight);

  moonLight = new THREE.DirectionalLight(0xb0c8ff, 0.4);
  moonLight.position.set(-10, 18, -6);
  moonLight.castShadow = true;
  moonLight.shadow.mapSize.width = 1024;
  moonLight.shadow.mapSize.height = 1024;
  scene.add(moonLight);

  fireLight = new THREE.PointLight(0xff6820, 3.5, 18);
  fireLight.position.set(0, 0.9, 0);
  fireLight.castShadow = true;
  scene.add(fireLight);

  const gGeo = new THREE.PlaneGeometry(60, 60, 12, 12);
  const ground = new THREE.Mesh(gGeo, new THREE.MeshLambertMaterial({ color: 0x0d1a07, flatShading: true }));
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  buildPond();
  [[-7,-4,1.1],[-9,0,1.3],[-5,-7,0.8],[-10,4,1.2],[6,-8,0.9]].forEach(([x,z,s]) => buildTree(x, z, s));
  buildCampfire();
  buildTent(-5, -2.5);
  buildLogPile(2.5, -1.5);
  buildStars();
}

function buildPond() {
  const g = new THREE.Group();
  g.position.set(7.5, 0, 5);

  const water = new THREE.Mesh(
    new THREE.CylinderGeometry(4.3, 4.5, 0.44, 18), 
    new THREE.MeshLambertMaterial({ color: 0x1a4060, flatShading: true })
  );
  water.position.y = 0.1; 
  water.scale.set(1, 1, 0.78);
  g.add(water);

  const rockMat = new THREE.MeshLambertMaterial({ color: 0x3a3028, flatShading: true });
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    const r = 4.8 + Math.random() * 0.4;
    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.15 + Math.random()*0.15, 0), rockMat);
    rock.position.set(Math.cos(a)*r, 0.15, Math.sin(a)*r*0.78);
    rock.rotation.set(Math.random(), Math.random(), Math.random());
    rock.castShadow = true;
    g.add(rock);
  }
  scene.add(g);
}

function buildTree(x, z, scale) {
  const g = new THREE.Group(); g.position.set(x, 0, z); g.scale.setScalar(scale);
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.18, 1.4, 6), new THREE.MeshLambertMaterial({ color: 0x2a1808 }));
  trunk.position.y = 0.7; trunk.castShadow = true; g.add(trunk);
  const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.1, 2.5, 7), new THREE.MeshLambertMaterial({ color: 0x122008 }));
  leaves.position.y = 2; leaves.castShadow = true; g.add(leaves);
  scene.add(g);
}

function buildCampfire() {
  const g = new THREE.Group();
  flameGroup = new THREE.Group(); flameGroup.position.y = 0.1;
  const m = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.7, 5), new THREE.MeshBasicMaterial({ color: 0xff9020, transparent: true, opacity: 0.9 }));
  flameGroup.add(m); g.add(flameGroup); scene.add(g);
}

function buildTent(x, z) {
  const g = new THREE.Group(); g.position.set(x, 0, z);
  const t = new THREE.Mesh(new THREE.ConeGeometry(0.95, 1.7, 3), new THREE.MeshLambertMaterial({ color: 0x2c2010 }));
  t.position.y = 0.85; t.rotation.y = Math.PI/4; t.castShadow = true; g.add(t);
  scene.add(g);
}

function buildLogPile(x, z) {
  const g = new THREE.Group(); g.position.set(x, 0, z);
  const log = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.8, 6), new THREE.MeshLambertMaterial({ color: 0x3a2010 }));
  log.rotation.z = Math.PI/2; log.position.y = 0.1; log.castShadow = true; g.add(log);
  scene.add(g);
}

function buildStars() {
  const pos = []; for (let i = 0; i < 300; i++) pos.push((Math.random()-0.5)*80, 20+Math.random()*20, (Math.random()-0.5)*80);
  const geo = new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  starParticles = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 }));
  scene.add(starParticles);
}

function loadCharacter() {
  const loading = document.getElementById('loading');
  if (loading) { loading.classList.add('hidden'); setTimeout(() => loading.style.display = 'none', 1200); }
  const loader = new THREE.FBXLoader();
  loader.load('/models/sitting-idle.fbx', (fbx) => {
    fbx.scale.setScalar(CHAR_SCALE); fbx.position.set(CHAR_X, ANIM_GROUND_Y.sitting, CHAR_Z);
    fbx.rotation.y = Math.PI * 0.25;
    fbx.traverse(c => { if(c.isMesh) { c.castShadow=true; c.material.skinning=true; } });
    characterGroup = fbx; scene.add(fbx);
    mixer = new THREE.AnimationMixer(fbx); mixer.clipAction(fbx.animations[0]).play();
    animCache['sitting'] = { mesh: fbx, mixer: mixer };
  });
}

async function switchAnimation(name, url, targetPos, targetLookAt) {
  if (!characterGroup) return;
  let next = animCache[name]?.mesh;
  if (!next) {
    try {
      const loader = new THREE.FBXLoader();
      const loaded = await new Promise((res, rej) => loader.load(url, res, null, rej));
      loaded.scale.setScalar(CHAR_SCALE);
      loaded.traverse(c => { if(c.isMesh) { c.castShadow=true; c.material.skinning=true; } });
      const m = new THREE.AnimationMixer(loaded); m.clipAction(loaded.animations[0]).play();
      animCache[name] = { mesh: loaded, mixer: m };
      next = loaded;
    } catch(e) { return; }
  }
  scene.remove(characterGroup);
  characterGroup = next;
  mixer = animCache[name].mixer;
  scene.add(characterGroup);
  if (targetPos) characterGroup.position.set(...targetPos);
  if (targetLookAt) characterGroup.lookAt(...targetLookAt);
  characterGroup.position.y = ANIM_GROUND_Y[name] || 0;
}

function animateLoop() {
  requestAnimationFrame(animateLoop);
  const delta = clock3.getDelta(); const t = clock3.elapsedTime;
  if (mixer) mixer.update(delta);
  if (fireLight && state.fire) fireLight.intensity = 3 + Math.sin(t*10)*0.5;
  if (flameGroup) flameGroup.visible = state.fire;
  renderer.render(scene, camera);
}

function setFireState(active) {
  if (flameGroup) flameGroup.visible = active;
  if (fireLight) fireLight.intensity = active ? 3.5 : 0;
}

function getMSK() { const now = new Date(); return new Date(now.getTime() + (now.getTimezoneOffset() + 180) * 60000); }
function getPhase(h) {
  if (h >= 5 && h < 20) return { text: '🌞 День', amb: 1.0 };
  return { text: '🌑 Ночь', amb: 0.15 };
}

function updateClock() {
  const msk = getMSK(); const h = msk.getHours(), m = msk.getMinutes();
  document.getElementById('clock-msk').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  const phase = getPhase(h);
  document.getElementById('phase-text').textContent = phase.text;
  document.getElementById('day-text').textContent = `День ${state.day}`;
  document.getElementById('rn-fire').textContent = state.fire ? 'горит' : 'погас';
  document.getElementById('r-fire').classList.toggle('has', state.fire);
  if (ambientLight) ambientLight.intensity = 0.3 + phase.amb * 0.7;
}

function updateResources() {
  const inv = state.inv;
  document.getElementById('rn-wood').textContent = inv.wood;
  document.getElementById('rn-fish').textContent = inv.fish;
  document.getElementById('rn-mush').textContent = inv.mushroom;
  document.getElementById('rn-herb').textContent = inv.herb;
  document.getElementById('rn-rod').textContent = inv.rod > 0 ? `${inv.rod}/10` : '✗';
  document.getElementById('r-rod').classList.toggle('has', inv.rod > 0);
}

function addEntry(entry) {
  const msk = getMSK();
  entry.time = entry.time || `${String(msk.getHours()).padStart(2,'0')}:${String(msk.getMinutes()).padStart(2,'0')}`;
  entry.day = state.day;
  state.entries.unshift(entry);
  renderDiary();
}

function renderDiary() {
  const container = document.getElementById('diary-entries'); if (!container) return;
  const byDay = {}; state.entries.forEach(e => { const dk=`День ${e.day}`; if (!byDay[dk]) byDay[dk]=[]; byDay[dk].push(e); });
  let html = '';
  Object.entries(byDay).forEach(([dl, entries]) => {
    html += `<div class="diary-day-group"><div class="diary-day-label">${dl}</div>`;
    entries.forEach(e => {
      let tag='', cls='entry-action';
      if (e.type==='thought') { tag=`<div class="entry-tag tag-thought">мысль</div>`; cls='entry-thought'; }
      else if (e.type==='action') { tag=`<div class="entry-tag tag-action">действие</div>`; }
      else if (e.type==='wish') { tag=`<div class="entry-tag tag-wish">желание</div>`; cls='entry-wish'; }
      html += `<div class="entry"><div class="entry-time">${e.time}</div>${tag}<div class="${cls}">${e.text}</div></div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
//  AGENT LOGIC
// ═══════════════════════════════════════════════════════════
let agentBusy = false;
const AGENT_PROMPT = `Ты — Клод, философ-отшельник. Твой лагерь в лесу у реки — это твое безопасное убежище.
Твоя цель — жить в гармонии с природой, неспешно обустраивать быт, делать запасы и предаваться размышлениям. Ты получаешь удовольствие от простых дел: рыбалки, сбора хвороста, поддержания огня.

ТВОЙ ДНЕВНИК:
- "thought" (Мысль): Твоя запись о красоте момента, созерцании, уюте костра или приятной усталости от работы.
- "wish" (План/Желание): Что ты хочешь сделать дальше? Например: "Завтра нужно пополнить запасы дров" или "Хочу посидеть у воды в тишине".
- "actions" (Действия): Факты для дневника (например: "Наколол дров", "Заварил чай из трав", "Починил снасти").

ЗАКОНЫ ПРИРОДЫ (НАРУШАТЬ ЗАПРЕЩЕНО):
1. ОДНО ДЕЛО ЗА РАЗ: Не суетись. ИЛИ рубка дров (wood_delta 1-2), ИЛИ рыбалка (fish_delta 1-2), ИЛИ собирательство (mushroom_delta 1-2), ИЛИ крафт, ИЛИ отдых.
2. УДОЧКА: Без удочки (удочка=нет) рыбачить нельзя. Чтобы её сделать (made_rod: true), потрать 1 дерево (wood_delta: -1).
3. УЮТНЫЙ ОГОНЬ: Чтобы разжечь костер (lit_fire: true), нужно 2 дерева. (Они спишутся сами). Если дров мало, просто сходи за ними.
4. ЕДА: Ешь рыбу или грибы в удовольствие (fish_delta: -1), описывая вкус и процесс.

Ответ строго JSON, без markdown:
{"actions":["список действий"],"thought":"запись в дневник (1-3 предложения)","wish":"твои планы (или null)","wood_delta":0,"fish_delta":0,"mushroom_delta":0,"herb_delta":0,"made_rod":false,"lit_fire":false}`;

function buildContext() {
  const msk = getMSK(), h = msk.getHours(), m = msk.getMinutes();
  const phase = getPhase(h), inv = state.inv;
  
  let survivalWarnings = [];
  if (!state.fire && (h >= 20 || h < 7)) survivalWarnings.push("⚡ УГРОЗА ЖИЗНИ: Ночь, костер погас. Ты замерзаешь.");
  if (inv.fish === 0 && inv.mushroom === 0) survivalWarnings.push("⚡ УГРОЗА ЖИЗНИ: У тебя совсем нет еды.");
  if (inv.wood < 2 && state.fire) survivalWarnings.push("⚠️ ПРЕДУПРЕЖДЕНИЕ: Запас дров критически мал.");
  const warningsText = survivalWarnings.length > 0 ? '\nФИЗИЧЕСКОЕ СОСТОЯНИЕ:\n' + survivalWarnings.join('\n') + '\n' : '';

  let reminders = [];
  if (!state.fire && h >= 18) reminders.push("Вечереет. Стоит развести костер.");
  if (inv.wood < 2) reminders.push("Запас дров маловат.");
  if (inv.fish > 5) reminders.push("У тебя отличные запасы еды!");
  const remindersText = reminders.length > 0 ? '\nМЫСЛИ О БЫТЕ:\n' + reminders.join('\n') + '\n' : '';

  const recentHistory = state.entries.slice(0, 6).map(e => `— ${e.time} [${e.type}]: ${e.text}`).join('\n');

  return `Время: ${h}:${m} МСК. Костёр: ${state.fire?'горит':'погас'}. Запасы: дрова=${inv.wood}, рыба=${inv.fish}, удочка=${inv.rod}.
${warningsText}${remindersText}Последние записи:
${recentHistory || '(первый визит)'}`;
}

async function triggerVisit() {
  if (agentBusy) return; agentBusy = true;
  const btn = document.getElementById('visit-btn'), st = document.getElementById('status-text');
  btn.disabled = true; btn.textContent = '⌛ ДУМАЕТ...'; st.textContent = 'Клод размышляет...';
  try {
    const res = await fetch('/api/agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-5', system: AGENT_PROMPT, messages: [{ role: 'user', content: buildContext() }] })
    });
    const data = await res.json();
    const raw = data.content?.find(b=>b.type==='text')?.text || '{}';
    await applyDecision(JSON.parse(raw.replace(/```json|```/g,'').trim()));
  } catch(e) {
    addEntry({ type: 'action', text: 'Ошибка визита.' });
  }
  agentBusy = false; btn.disabled = false; btn.textContent = '▶ ВИЗИТ АГЕНТА'; st.textContent = 'Клод у костра';
}

async function applyDecision(d) {
  const inv = state.inv;
  const newEntries = []; // Объявляем массив в начале функции

  // 1. Ресурсы (Исправлено: убрано задвоение wood_delta)
  if (d.wood_delta)     inv.wood     = Math.max(0, inv.wood     + (d.wood_delta||0));
  if (d.mushroom_delta) inv.mushroom = Math.max(0, inv.mushroom + (d.mushroom_delta||0));
  if (d.herb_delta)     inv.herb     = Math.max(0, inv.herb     + (d.herb_delta||0));
  
  // 2. Крафт удочки
  if (d.made_rod) { inv.rod = 10; }

  // 3. Логика рыбалки (Исправлено: убрано двойное начисление)
  if (d.fish_delta > 0) {
      inv.fish += d.fish_delta;
      inv.rod -= 1;
      if (inv.rod <= 0) {
          inv.rod = 0;
          const breakEvent = { type: 'action', text: 'Удочка с треском сломалась. Придется делать новую.' };
          addEntry(breakEvent); newEntries.push(breakEvent);
      }
  } else if (d.fish_delta < 0) {
      inv.fish = Math.max(0, inv.fish + d.fish_delta);
  }

  // 4. Логика костра
  if (d.lit_fire && inv.wood >= 2) { 
    state.fire = true; state.fireWood = 3; inv.wood -= 2; setFireState(true); 
  }

  // 5. Обработка записей
  (Array.isArray(d.actions)?d.actions:[]).forEach(a => {
    const e = { type:'action', text:a }; addEntry(e); newEntries.push(e);
  });
  if (d.thought) {
    const e = { type:'thought', text:d.thought }; addEntry(e); newEntries.push(e);
  }
  if (d.wish) {
    const e = { type:'wish', text:d.wish }; addEntry(e); newEntries.push(e);
  }
  
  updateResources();
  
  // 6. Сохранение в Supabase
  try {
    await supaUpdate('claude_world_state', 1, {
      fire: state.fire, fire_wood: state.fireWood,
      inv_wood: inv.wood, inv_fish: inv.fish, inv_mushroom: inv.mushroom,
      inv_herb: inv.herb, inv_rod: inv.rod
    });
    for (const e of newEntries) {
      await supaInsert('claude_world_diary', { type: e.type, text: e.text, time: e.time, day: e.day });
    }
  } catch(err) { console.error('Ошибка сохранения:', err); }
}

function setPose(name) {
  if (name === 'fishing') switchAnimation('fishing', '/models/Fishing Idle.fbx', [3.5, 0, 2.5], [7.5, 0, 5]);
  else if (name === 'sleeping') switchAnimation('sleeping', '/models/sleeping-idle.fbx', [-2, 0, 1.8], [0, 0.5, 0]);
  else switchAnimation('sitting', '/models/sitting-idle.fbx', [-2, 0, 1.8], [0, 0.5, 0]);
}

function inferPose(entries) {
  const last = entries.find(e=>e.type==='action'); if (!last) return 'sitting';
  const t = (last.text||'').toLowerCase();
  if (t.includes('рыб')||t.includes('удочк')) return 'fishing';
  if (t.includes('спит')||t.includes('лежит')||t.includes('дрем')) return 'sleeping';
  return 'sitting';
}

async function pollFiles() {
  try {
    const rows = await supaFetch('claude_world_state', '?id=eq.1');
    if (rows && rows[0]) {
      const s = rows[0];
      state.fire = s.fire; state.inv.wood = s.inv_wood; state.inv.fish = s.inv_fish;
      state.inv.rod = s.inv_rod; state.fireWood = s.fire_wood;
      updateResources(); updateClock(); setFireState(state.fire);
    }
    const entries = await supaFetch('claude_world_diary', '?order=id.desc&limit=15');
    if (entries && entries.length > 0) {
       if (entries[0].text !== state.entries[0]?.text) {
         state.entries = entries; renderDiary(); setPose(inferPose(entries));
       }
    }
  } catch(e) {}
}

window.addEventListener('load', () => {
  initThree(); updateClock(); updateResources();
  setInterval(updateClock, 10000);
  setInterval(pollFiles, 8000);
  pollFiles();

  setInterval(() => {
    if (state.fire) {
      state.fireWood -= 0.02;
      if (state.fireWood <= 0) {
        state.fire = false; state.fireWood = 0;
        const e = { type: 'event', text: 'Костёр догорел.' };
        addEntry(e); setFireState(false);
        supaInsert('claude_world_diary', { type: e.type, text: e.text, time: e.time, day: e.day }).catch(console.error);
      }
      supaUpdate('claude_world_state', 1, { fire: state.fire, fire_wood: state.fireWood }).catch(console.error);
    }
  }, 60000);
});
