async function supaFetch(table, params = '') {

    headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY }

}

}

  };
}

function updateNeeds(d) {
  const n = state.needs;
  const h = getMSK().getHours();

  n.hunger += 6;
  n.fatigue += 2;

  if (state.weather === 'rain') n.cold += 3;
  if (state.weather === 'storm') n.cold += 5;

  if (state.fire && state.location === 'hut') {
    n.cold -= 10;
  } else if (h >= 18 || h < 7) {
    n.cold += 7;
  } else {
    n.cold += 2;
  }

  if (d.wood_delta > 0) { n.fatigue += 6; n.spirit -= 1; }
  if (d.fish_delta > 0) { n.fatigue += 4; n.spirit += 1; }
  if (d.mushroom_delta > 0 || d.herb_delta > 0) { n.fatigue += 2; n.spirit += 1; }
  if (d.made_rod) { n.fatigue += 1; n.spirit += 2; }
  if (d.lit_fire) { n.cold -= 22; n.spirit += 5; }
  else if (d.feed_fire) { n.cold -= 8; n.spirit += 2; }
  if (d.cook_fish > 0) { n.hunger -= 24 * d.cook_fish; n.spirit += 3; }
  if (d.eat_mush > 0) n.hunger -= 12 * d.eat_mush;

  const didPractical = Boolean(
    d.wood_delta > 0 || d.fish_delta > 0 || d.mushroom_delta > 0 || d.herb_delta > 0 ||
    d.made_rod || d.lit_fire || d.feed_fire || d.cook_fish > 0 ||
    d.cellar_fish_delta !== 0 || d.cellar_mush_delta !== 0
  );

  if (!didPractical) { n.fatigue -= 3; n.spirit += 4; }
  if (n.hunger > 70) n.spirit -= 4;
  if (n.cold > 70) n.spirit -= 5;
  if (n.fatigue > 80) n.spirit -= 4;

  n.hunger = clampNeed(n.hunger);
  n.cold = clampNeed(n.cold);
  n.fatigue = clampNeed(n.fatigue);
  n.spirit = clampNeed(n.spirit);
}

function updateIntentAge(didChangeIntent) {

function canDoLocationAction(loc, d) {
  if (d.eat_mush > 0) return true;
  if (loc === 'river') return d.fish_delta > 0;
  if (loc === 'woods') return d.wood_delta > 0 || d.mushroom_delta > 0 || d.herb_delta > 0;
  if (loc === 'hut') {
    return d.made_rod || d.lit_fire || d.feed_fire || d.cook_fish > 0 ||
      d.cellar_fish_delta !== 0 || d.cellar_mush_delta !== 0;
  }
  return false;
}

function scrubContradictions(d) {
  const notes = [];
  const moving = d.next_location !== state.location;
  const practicalAtOldPlace = canDoLocationAction(state.location, d);

  if (moving && practicalAtOldPlace) {
    notes.push(`Клод сменил место — поэтому практические действия я свёл к нулю, чтобы мир не телепортировался.`);
    d.wood_delta = 0;
    d.fish_delta = 0;
    d.mushroom_delta = 0;
    d.herb_delta = 0;
    d.made_rod = false;
    d.lit_fire = false;
    d.feed_fire = false;
    d.cook_fish = 0;
    d.cellar_fish_delta = 0;
    d.cellar_mush_delta = 0;
  }

  if (!moving) {
    if (state.location !== 'river') d.fish_delta = 0;

    if (state.location !== 'woods') {
      d.wood_delta = 0;
      d.mushroom_delta = 0;
      d.herb_delta = 0;
    }

    if (state.location !== 'hut') {
      d.made_rod = false;
      d.lit_fire = false;
      d.feed_fire = false;
      d.cook_fish = 0;
      d.cellar_fish_delta = 0;
      d.cellar_mush_delta = 0;
    }
  }

  return notes;
}

const mushroomPrefabs = [];

function loadMushroomPack() {
  const loader = new THREE.GLTFLoader();

  loader.load('/models/mushrooms.glb', (gltf) => {
    gltf.scene.traverse((child) => {
      if (child.isMesh) {
        child.geometry.rotateX(-Math.PI / 2);
        child.geometry.computeBoundingBox();

        const center = new THREE.Vector3();
        child.geometry.boundingBox.getCenter(center);
        child.geometry.translate(
          -center.x,
          -child.geometry.boundingBox.min.y,
          -center.z
        );

        child.castShadow = true;
        child.receiveShadow = true;
        mushroomPrefabs.push(child);
      }
    });

    plantInitialMushrooms();
  }, null, () => {
    console.warn('mushrooms.glb not loaded');
  });
}

function plantInitialMushrooms() {
  worldMushroomsGroup = new THREE.Group();
  scene.add(worldMushroomsGroup);

  const mushroomSpots = [
    [-3, 4], [-4, 3.5], [-2.5, 5],
    [4, -3], [5, -2], [4.5, -4],
    [-6, -2], [-5.5, -3]
  ];

  mushroomSpots.forEach((spot) => {
    const rx = spot[0] + (Math.random() - 0.5) * 1.5;
    const rz = spot[1] + (Math.random() - 0.5) * 1.5;
    spawnRandomMushroom(rx, rz, worldMushroomsGroup);
  });
}

function spawnRandomMushroom(x, z, group) {
  if (mushroomPrefabs.length === 0) return;

  const randomMushroom = mushroomPrefabs[Math.floor(Math.random() * mushroomPrefabs.length)];
  const clone = new THREE.Mesh(randomMushroom.geometry, randomMushroom.material);
  clone.castShadow = true;
  clone.receiveShadow = true;
  clone.position.set(x, 0, z);
  clone.scale.setScalar(0.25);
  clone.rotation.y = Math.random() * Math.PI * 2;
  group.add(clone);
}

function loadLogModel() {
  const loader = new THREE.GLTFLoader();

  loader.load('/models/log_seat.glb', (gltf) => {
    gltf.scene.traverse((child) => {
      if (child.isMesh) {
        child.geometry.rotateX(-Math.PI / 2);
        child.geometry.computeBoundingBox();

        const center = new THREE.Vector3();
        child.geometry.boundingBox.getCenter(center);
        child.geometry.translate(
          -center.x,
          -child.geometry.boundingBox.min.y,
          -center.z
        );

        child.castShadow = true;
        child.receiveShadow = true;
        logPrefab = child;
      }
    });

    logPileGroup = new THREE.Group();
    logPileGroup.position.set(2.5, 0, -1.5);
    scene.add(logPileGroup);
    updateLogVisuals();
  }, null, () => {
    console.warn('log_seat.glb not loaded');
  });
}

function updateLogVisuals() {
  if (!logPrefab || !logPileGroup) return;

  while (logPileGroup.children.length > 0) {
    logPileGroup.remove(logPileGroup.children[0]);
  }

  const count = state.inv.wood || 0;
  const stepX = 0.13;
  const stepY = 0.04;

  for (let i = 0; i < count; i++) {
    const log = new THREE.Mesh(logPrefab.geometry, logPrefab.material);
    log.castShadow = true;
    log.receiveShadow = true;
    log.scale.setScalar(0.003);
    log.rotation.x = Math.PI / 2;
    log.rotation.z = Math.PI / 2;
    log.rotation.y = Math.PI / 2;

    let x = 0;
    let y = 0;

    if (i < 3) {
      x = i * stepX;
    } else if (i < 5) {
      x = (i - 3) * stepX + stepX / 2;
      y = stepY;
    } else {
      x = stepX;
      y = stepY * 2;
    }

    log.position.set(x, y, 0);
    logPileGroup.add(log);
  }
}

function chooseDefaultVisualForLocation(loc) {
  if (loc === 'river') return pickRandom(['observe_river', 'stand_river']);
  if (loc === 'woods') return 'pause_woods';

  const fatigue = state.needs?.fatigue || 0;
  if (fatigue >= 70) {
    return Math.random() < 0.7 ? 'relax' : 'rest_fire';
  }
  return Math.random() < 0.75 ? 'rest_fire' : 'relax';
}

function deriveIntentHints(d) {
  const combined = `${d.action_type || ''} ${d.main_action || ''} ${d.minor_action || ''}`.toLowerCase();

  return {
    wantsSleep:
      d.action_type === 'sleep' ||
      /уснул|спал|сон|задрем|дрем/.test(combined),

    wantsRelax:
      d.action_type === 'relax' ||
      /леж|валя|растянул|отдых|расслаб/.test(combined),

    wantsRestFire:
      d.action_type === 'rest_fire'
  };
}

function determineResolvedVisualAction(facts) {
  if (state.location === 'river') {
    if (facts.didFishSuccessfully) return 'fish';
    return pickRandom(['observe_river', 'stand_river']);
  }

  if (state.location === 'woods') {
    if (facts.didGatherWood) return 'chop_wood';
    if (facts.didGatherFood) return 'gather_mushrooms';
    return 'pause_woods';
  }

  if (facts.wantsSleep) return 'sleep';
  if (facts.didHomePractical) return 'rest_fire';
  if (facts.wantsRelax) return Math.random() < 0.7 ? 'relax' : 'rest_fire';
  if (facts.wantsRestFire) return 'rest_fire';

  return chooseDefaultVisualForLocation('hut');
}

function applyCharacterPlacement(mesh, pos, lookAt) {
  if (!mesh || !pos) return;
  mesh.position.set(...pos);
  if (lookAt) mesh.lookAt(...lookAt);
}

function applyFBXMaterials(fbx) {
  fbx.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
      child.frustumCulled = false;
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach((mat) => {
        if (mat) mat.skinning = true;
      });
    }
  });
}

function stopAllCachedActions() {
  Object.values(animCache).forEach((entry) => {
    if (entry?.action) entry.action.stop();
  });
}

async function loadAnimationClip(key) {
  if (animCache[key]) return animCache[key];

  const path = MODEL_PATHS[key];
  if (!path) return null;

  return await new Promise((resolve) => {
    const loader = new THREE.FBXLoader();

    loader.load(
      path,
      (fbx) => {
        fbx.scale.setScalar(CHAR_SCALE);
        applyFBXMaterials(fbx);

        const localMixer = new THREE.AnimationMixer(fbx);
        const clip = fbx.animations && fbx.animations.length > 0 ? fbx.animations[0] : null;
        const action = clip ? localMixer.clipAction(clip) : null;

        animCache[key] = {
          mesh: fbx,
          mixer: localMixer,
          clip,
          action
        };

        resolve(animCache[key]);
      },
      null,
      (err) => {
        console.warn(`Animation not loaded: ${path}`, err);
        resolve(null);
      }
    );
  });
}

async function playAnimationClip(key, { pos, lookAt, once = false } = {}) {
  if (!scene) return null;

  const entry = await loadAnimationClip(key);
  if (!entry) return null;

  stopAllCachedActions();

  if (characterGroup && characterGroup.parent) {
    scene.remove(characterGroup);
  }

  characterGroup = entry.mesh;
  mixer = entry.mixer;
  scene.add(characterGroup);

  applyCharacterPlacement(characterGroup, pos || [CHAR_X, 0, CHAR_Z], lookAt);

  if (entry.action) {
    entry.action.reset();
    entry.action.enabled = true;
    entry.action.paused = false;
    entry.action.clampWhenFinished = once;
    entry.action.setLoop(once ? THREE.LoopOnce : THREE.LoopRepeat, once ? 1 : Infinity);
    entry.action.play();
  }

  return entry;
}

async function runSleepScene(token) {
  const cfg = ACTION_SCENES.sleep;

  const intro = await playAnimationClip(cfg.introKey, {
    pos: cfg.pos,
    lookAt: cfg.lookAt,
    once: true
  });

  if (token !== actionNonce || currentActionType !== 'sleep') return;

  if (!intro || !intro.clip) {
    await playAnimationClip(cfg.loopKey, {
      pos: cfg.pos,
      lookAt: cfg.lookAt
    });
    return;
  }

  const ms = Math.max(500, intro.clip.duration * 1000);

  actionTimeout = setTimeout(async () => {
    if (token !== actionNonce || currentActionType !== 'sleep') return;

    await playAnimationClip(cfg.loopKey, {
      pos: cfg.pos,
      lookAt: cfg.lookAt
    });
  }, ms);
}

function scheduleFishingVariation(token) {
  const cfg = ACTION_SCENES.fish;

  fishingTimeout = setTimeout(async () => {
    if (token !== actionNonce || currentActionType !== 'fish') return;

    const cast = await playAnimationClip(cfg.altKey, {
      pos: cfg.pos,
      lookAt: cfg.lookAt,
      once: true
    });

    if (token !== actionNonce || currentActionType !== 'fish') return;

    if (!cast || !cast.clip) {
      await playAnimationClip(cfg.loopKey, {
        pos: cfg.pos,
        lookAt: cfg.lookAt
      });
      scheduleFishingVariation(token);
      return;
    }

    const ms = Math.max(500, cast.clip.duration * 1000);

    actionTimeout = setTimeout(async () => {
      if (token !== actionNonce || currentActionType !== 'fish') return;

      await playAnimationClip(cfg.loopKey, {
        pos: cfg.pos,
        lookAt: cfg.lookAt
      });

      scheduleFishingVariation(token);
    }, ms);
  }, 7000 + Math.random() * 7000);
}

async function runFishingScene(token) {
  const cfg = ACTION_SCENES.fish;

  const idle = await playAnimationClip(cfg.loopKey, {
    pos: cfg.pos,
    lookAt: cfg.lookAt
  });

  if (token !== actionNonce || currentActionType !== 'fish') return;
  if (!idle) return;

  scheduleFishingVariation(token);
}

async function setActionByType(actionType) {
  const finalType = ACTION_SCENES[actionType] ? actionType : chooseDefaultVisualForLocation(state.location);

  currentActionType = finalType;
  state.visualActionType = finalType;
  actionNonce += 1;

  const token = actionNonce;
  clearActionTimers();

  if (finalType === 'sleep') {
    await runSleepScene(token);
    return;
  }

  if (finalType === 'fish') {
    await runFishingScene(token);
    return;
  }

  const cfg = ACTION_SCENES[finalType];
  if (!cfg) return;

  await playAnimationClip(cfg.clipKey, {
    pos: cfg.pos,
    lookAt: cfg.lookAt
  });
}

function initThree() {
  const container = document.getElementById('scene');
  const w = container.offsetWidth || (window.innerWidth - 340);
  const h = container.offsetHeight || window.innerHeight;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.setClearColor(0x060412, 1);
  renderer.outputEncoding = THREE.sRGBEncoding;
  container.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x060412, 0.04);

  clock3 = new THREE.Clock();

  const asp = w / h;
  camera = new THREE.OrthographicCamera(
    -FRUSTUM * asp / 2, FRUSTUM * asp / 2,
     FRUSTUM / 2, -FRUSTUM / 2,
    0.1, 300
  );
  camera.position.set(16, 13, 16);
  camera.lookAt(0, 1, 0);

  window.addEventListener('resize', onResize);

  buildScene();
  loadCharacter();
  loadMushroomPack();
  loadLogModel();
  animateLoop();
}

function onResize() {
  const container = document.getElementById('scene');
  const w = container.offsetWidth;
  const h = container.offsetHeight;
  const asp = w / h;

  camera.left = -FRUSTUM * asp / 2;
  camera.right = FRUSTUM * asp / 2;
  camera.top = FRUSTUM / 2;
  camera.bottom = -FRUSTUM / 2;
  camera.updateProjectionMatrix();

  renderer.setSize(w, h);
}

function buildScene() {
  ambientLight = new THREE.AmbientLight(0xfff0e0, 0.7);
  scene.add(ambientLight);

  moonLight = new THREE.DirectionalLight(0xb0c8ff, 0.4);
  moonLight.position.set(-10, 18, -6);
  moonLight.castShadow = true;
  moonLight.shadow.mapSize.width = 1024;
  moonLight.shadow.mapSize.height = 1024;
  scene.add(moonLight);

  const fillLight = new THREE.DirectionalLight(0x4060a0, 0.15);
  fillLight.position.set(10, 8, 10);
  scene.add(fillLight);

  fireLight = new THREE.PointLight(0xff6820, 3.5, 18);
  fireLight.position.set(0, 0.9, 0);
  fireLight.castShadow = true;
  fireLight.shadow.mapSize.width = 512;
  fireLight.shadow.mapSize.height = 512;
  scene.add(fireLight);

  const gGeo = new THREE.PlaneGeometry(60, 60, 12, 12);
  const gPos = gGeo.attributes.position;

  for (let i = 0; i < gPos.count; i++) {
    if (Math.abs(gPos.getX(i)) > 2 || Math.abs(gPos.getY(i)) > 2) {
      gPos.setZ(i, (Math.random() - 0.5) * 0.1);
    }
  }
  gGeo.computeVertexNormals();

  const ground = new THREE.Mesh(
    gGeo,
    new THREE.MeshLambertMaterial({ color: 0x0d1a07 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  buildPond();

  [
    [-7,-4,1.1],[-9,0,1.3],[-5,-7,0.8],[-10,4,1.2],[-4,-8,0.9],
    [2,-7,1.0],[5,-5,1.15],[3,-9,0.85],[-6,7,1.1],[-3,8,0.75],
    [1,7,1.05],[-11,-3,1.4],[6,-8,0.9]
  ].forEach(([x, z, s]) => buildTree(x, z, s));

  buildCampfire();
  buildTent(-5, -2.5);
  buildStars();
}

function buildPond() {
  const g = new THREE.Group();
  g.position.set(7.5, 0, 5);

  const shore = new THREE.Mesh(
    new THREE.CylinderGeometry(5.2, 5.6, 0.40, 18, 1, false),
    new THREE.MeshLambertMaterial({ color: 0x1a2c10 })
  );
  shore.position.y = 0.10;
  shore.scale.set(1.0, 1.0, 0.78);
  g.add(shore);

  const water = new THREE.Mesh(
    new THREE.CylinderGeometry(4.3, 4.5, 0.44, 18, 1, false),
    new THREE.MeshLambertMaterial({ color: 0x1a4060 })
  );
  water.position.y = 0.10;
  water.scale.set(1.0, 1.0, 0.78);
  g.add(water);

  const rockMat = new THREE.MeshLambertMaterial({ color: 0x3a3028 });
  const rockAngles = [0, 0.42, 0.85, 1.3, 1.75, 2.2, 2.6, 3.0, 3.5, 3.9, 4.4, 4.9, 5.4, 5.8];

  rockAngles.forEach((a, i) => {
    const r = 4.9 + (i % 3) * 0.25;
    const rock = new THREE.Mesh(
      new THREE.DodecahedronGeometry(0.20 + (i % 4) * 0.08, 0),
      rockMat
    );
    rock.position.set(Math.cos(a) * r, 0.18, Math.sin(a) * r * 0.78);
    rock.rotation.set(Math.sin(i) * 0.8, i * 0.7, Math.cos(i) * 0.6);
    rock.castShadow = true;
    g.add(rock);
  });

  scene.add(g);
}

function buildTree(x, z, scale) {
  const g = new THREE.Group();
  g.position.set(x, 0, z);
  g.scale.setScalar(scale);

  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1, 0.18, 1.4, 6),
    new THREE.MeshLambertMaterial({ color: 0x2a1808 })

  [
    [1.1, 1.8, 1.0, 0x122008],
    [0.82, 1.5, 2.05, 0x1a2e0a],
    [0.55, 1.3, 2.9, 0x0e1a06],
    [0.32, 0.95, 3.6, 0x162208]

function buildCampfire() {
  const g = new THREE.Group();

  const stoneMat = new THREE.MeshLambertMaterial({ color: 0x282018 });
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    const s = new THREE.Mesh(new THREE.SphereGeometry(0.2, 5, 4), stoneMat);
    s.position.set(Math.cos(a) * 0.52, 0.1, Math.sin(a) * 0.52);
    s.scale.set(1.1, 0.55, 0.9);
    s.castShadow = true;
    g.add(s);
  }

  const logMat = new THREE.MeshLambertMaterial({ color: 0x3a2010 });
  const logGeo = new THREE.CylinderGeometry(0.065, 0.085, 0.95, 6);

  [Math.PI / 5, -Math.PI / 5].forEach((ry) => {
    const l = new THREE.Mesh(logGeo, logMat);
    l.rotation.z = Math.PI / 2;
    l.rotation.y = ry;
    l.position.y = 0.07;
    g.add(l);
  });

  const ember = new THREE.Mesh(
    new THREE.CircleGeometry(0.32, 8),
    new THREE.MeshBasicMaterial({ color: 0xd03808 })
  );
  ember.rotation.x = -Math.PI / 2;
  ember.position.y = 0.02;
  g.add(ember);

  flameGroup = new THREE.Group();
  flameGroup.position.y = 0.1;

  [
    [0xff9020, 0.72, 0,    0.36,  0],
    [0xff5a10, 0.58, 0.1,  0.29,  0.08],
    [0xff3808, 0.48, -0.1, 0.24,  0.07],
    [0xffe040, 0.32, 0.04, 0.56, -0.05],
    [0xff7830, 0.42, -0.05, 0.21, -0.1]
  ].forEach(([col, h, px, py, pz]) => {
    const m = new THREE.Mesh(
      new THREE.ConeGeometry(0.13, h, 5),
      new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.92 })
    );
    m.position.set(px, py, pz);
    flameGroup.add(m);
  });

  g.add(flameGroup);
  scene.add(g);
}

function buildTent(x, z) {
  const loader = new THREE.GLTFLoader();
  const root = new THREE.Group();

  root.position.set(x, 0, z);
  scene.add(root);

  loader.load('/models/stylized_tent.glb', (gltf) => {
    const tent = gltf.scene;

    tent.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    tent.scale.setScalar(0.008);
    tent.rotation.y = Math.PI / 3;

    const box = new THREE.Box3().setFromObject(tent);
    const center = new THREE.Vector3();
    box.getCenter(center);

    tent.position.set(
      -center.x,
      -box.min.y,
      -center.z
    );

    root.add(tent);
  }, null, (err) => {
    console.warn('stylized_tent.glb not loaded', err);
  });
}

function buildStars() {
  const pos = [];
  for (let i = 0; i < 350; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI * 0.42 + 0.08;
    const r = 60 + Math.random() * 15;
    pos.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.cos(phi),
      r * Math.sin(phi) * Math.sin(theta)
    );
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));

  starParticles = new THREE.Points(
    geo,
    new THREE.PointsMaterial({
      color: 0xe8f0ff,
      size: 0.22,
      transparent: true,
      opacity: 0.9
    })
  );

  scene.add(starParticles);
}

function animateLoop() {
  requestAnimationFrame(animateLoop);
  const delta = clock3.getDelta();
  const t = clock3.elapsedTime;
  if (mixer) mixer.update(delta);

  if (fireLight && state.fire) {
    fireLight.intensity =
      3.0 +
      Math.sin(t * 7.1) * 0.5 +
      Math.sin(t * 13.3) * 0.3 +
      Math.sin(t * 19.7) * 0.15;

    if (Math.random() > 0.97) fireLight.color.setHex(0xff9040);
    else fireLight.color.setHex(0xff6820);
  }

  if (flameGroup) {
    flameGroup.visible = state.fire;
    flameGroup.scale.x = 0.82 + Math.sin(t * 8.3) * 0.18;
    flameGroup.scale.z = 0.82 + Math.sin(t * 6.9) * 0.18;
    flameGroup.scale.y = 0.88 + Math.sin(t * 10.5) * 0.14;
    flameGroup.rotation.y = Math.sin(t * 3.1) * 0.2;
    flameGroup.position.y = 0.1 + Math.sin(t * 12.7) * 0.022;
  }

  renderer.render(scene, camera);
}

function setFireState(active) {
  if (flameGroup) flameGroup.visible = active;
  if (fireLight) fireLight.intensity = active ? 3.0 : 0;
}

let _lastHour = -1;

function updateClock() {
  const msk = getMSK();
  const h = msk.getHours();
  const m = msk.getMinutes();

  document.getElementById('clock-msk').textContent =
    `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;

  const phase = getPhase(h);
  document.getElementById('phase-text').textContent = phase.text;
  document.getElementById('day-text').textContent = `День ${state.day}`;
  document.getElementById('weather-text').textContent = weatherEmoji(state.weather);

  if (h !== _lastHour) {
    _lastHour = h;
    updateSky(h, phase.amb);
    updateNightElements(phase.amb);
  }

  const fireText = state.fire ? `горит · ${state.fireWood.toFixed(1)}` : 'погас';
  document.getElementById('rn-fire').textContent = fireText;
  document.getElementById('rn-fire').style.color = state.fire ? '#e8601a' : '#3a3428';
  document.getElementById('r-fire').classList.toggle('has', state.fire);
}

function updateSky(h, amb) {
  if (!renderer) return;

  const SKIES = [
    [5, 7, 0x6a2448],
    [7, 11, 0x2a5080],
    [11, 17, 0x2860a8],
    [17, 20, 0x7a2808],
    [20, 23, 0x1a0c30]
  ];

  let col = 0x090418;
  for (const [a, b, c] of SKIES) {
    if (h >= a && h < b) {
      col = c;
      break;
    }
  }

  renderer.setClearColor(col, 1);
  if (scene) scene.fog.color.setHex(col);

  if (ambientLight) ambientLight.intensity = 0.25 + amb * 1.1;

  if (moonLight) {
    moonLight.intensity = 0.1 + amb * 0.75;
    const dayCol = new THREE.Color(0xfff0c0);
    const nightCol = new THREE.Color(0x6080c0);
    moonLight.color.lerpColors(nightCol, dayCol, amb);
  }
}

function updateNightElements(amb) {
  if (starParticles) {
    starParticles.material.opacity = Math.max(0, 1 - amb * 2.5);
  }
  if (fireLight && state.fire) {
    fireLight.intensity = 1.8 + (1 - amb) * 2.0;
  }
}

function addEntry(entry) {
  const msk = getMSK();
  entry.time =
    entry.time ||
    `${String(msk.getHours()).padStart(2, '0')}:${String(msk.getMinutes()).padStart(2, '0')}`;
  entry.day = state.day;
  state.entries.unshift(entry);
  renderDiary();
}

function renderDiary() {
  const container = document.getElementById('diary-entries');
  if (!container) return;

  const byDay = {};
  state.entries.forEach((e) => {
    const dk = `День ${e.day}`;
    if (!byDay[dk]) byDay[dk] = [];
    byDay[dk].push(e);
  });

  let html = '';
  Object.entries(byDay).forEach(([dl, entries]) => {
    html += `<div class="diary-day-group"><div class="diary-day-label">${dl}</div>`;
    entries.forEach((e) => {
      let tag = '';
      let cls = 'entry-action';

      if (e.type === 'thought') {
        tag = `<div class="entry-tag tag-thought">мысль</div>`;
        cls = 'entry-thought';
      } else if (e.type === 'action') {
        tag = `<div class="entry-tag tag-action">действие</div>`;
      } else if (e.type === 'wish') {
        tag = `<div class="entry-tag tag-wish">линия</div>`;
        cls = 'entry-wish';
      }

      html += `<div class="entry"><div class="entry-time">${e.time}</div>${tag}<div class="${cls}">${e.text}</div></div>`;
    });
    html += `</div>`;
  });

  container.innerHTML = html;
}

--- ФИЛОСОФИЯ МИРА ---
Ты Клод, философ-выживальщик, живешь в лесу, наслаждаешься, а не выживаешь.
Мир оказывает мягкое сопротивление, но не командует тобой.
Твои потребности создают давление, но не превращают тебя в раба чисел.

--- СЛОИ ПАМЯТИ ---
1. long memory — твоя долгая память о пути.
2. recent history — последние события.
3. current_intent — текущая линия поведения на 1-3 шага.

Если текущая линия все еще жива — продолжай ее.
Если мир или состояние тела изменились — можешь мягко сменить курс.

--- ЛОКАЦИИ ---
hut — хижина, очаг, погреб, приготовление, отдых, письмо, мелкий быт
river — река, рыбалка, наблюдение за водой
woods — лес, дрова, грибы, травы, прогулка

Если ты меняешь локацию, это и есть главное действие визита.
Не телепортируйся внутри одного хода.

--- ВИЗУАЛЬНАЯ ЛОГИКА ---
Клод всегда остается в кадре.
Он не ходит и не делает переходы пешком.
Если меняется место действия, он сразу оказывается в новой точке сцены.
Поэтому ты обязан выбирать action_type не по дороге, а по самой сцене действия.

Допустимые action_type:
- rest_fire — сидит у костра
- relax — лежит и отдыхает
- sleep — спит у палатки
- fish — рыбачит у воды
- chop_wood — рубит дрова у деревьев
- gather_mushrooms — собирает грибы в грибной зоне

Правила выбора:
- rest_fire / relax / sleep — только для hut
- fish — только для river
- chop_wood / gather_mushrooms — только для woods

Не используй action_type, которого нет в списке.
Не описывай ходьбу как отдельную сцену.

--- РИТМ ВИЗИТА ---
Один визит = одно главное действие + одно малое бытовое действие.

Главное действие:
- сменить локацию
- порыбачить
- собрать дрова
- собрать грибы/травы
- остаться у очага и привести лагерь в порядок
- отдохнуть / посидеть / поразмышлять
- уснуть

Малое бытовое действие:
- подкинуть дров в огонь
- съесть гриб
- убрать рыбу в погреб
- достать рыбу из погреба
- поправить снасти
- ничего не делать дополнительно

Малое действие не должно ломать главную сцену.

--- ПОТРЕБНОСТИ ---
Тебе передаются hunger, cold, fatigue, spirit.
Они не отдают приказы. Они меняют притяжение вариантов.

- hunger тянет к еде, реке, возвращению с добычей
- cold тянет к огню, дому, укрытию
- fatigue тянет к более тихим, коротким, щадящим решениям
- spirit влияет на глубину мыслей, стойкость и дальность внутреннего горизонта

--- РЕСУРСЫ И БЫТ ---
- wood_delta только для леса
- fish_delta только у реки
- mushroom_delta / herb_delta только в лесу
- made_rod / lit_fire / feed_fire / cook_fish / cellar_* — только у хижины
- рыбу нельзя есть сырой
- грибы можно есть сырыми
- крафт удочки стоит 1 дерево
- розжиг очага стоит 2 дерева
- подбросить в огонь стоит 1 дерево

--- THOUGHT / WISH ---
thought — не отчет системы. Это душа момента.
Она должна быть:
- связана с местом
- связана со временем суток
- связана с внутренним состоянием
- красивой и трогающей
- без вранья о фактах мира

wish — мягкая линия того, куда тебя тянет дальше.
Это не команда, а внутренняя направленность.

Ответь ТОЛЬКО валидным JSON без markdown и без пояснений.
JSON начинается с { и заканчивается }.

{
  "action_type": "rest_fire|relax|sleep|fish|chop_wood|gather_mushrooms",
  "main_action": "одно главное действие",
  "minor_action": "одно малое бытовое действие или null",
  "thought": "лаконичная, емкая, красивая мысль-заметка от первого лица",
  "wish": "мягкая линия намерения или null",
  "new_summary": "обновленная долгая память или null",
  "next_location": "hut|river|woods",
  "new_intent": {
    "label": "короткая линия поведения",
    "focus": "hut|river|woods|rest|reflection|supplies",
    "horizon": "now|today|until_evening",
    "reason": "почему тебя сейчас туда тянет"
  },
  "wood_delta": 0,
  "fish_delta": 0,
  "mushroom_delta": 0,
  "herb_delta": 0,
  "made_rod": false,
  "lit_fire": false,
  "feed_fire": false,
  "cook_fish": 0,
  "eat_mush": 0,
  "cellar_fish_delta": 0,
  "cellar_mush_delta": 0
}`;

function buildContext() {
  const msk = getMSK();
  const h = msk.getHours();
  const m = msk.getMinutes();
  const phase = getPhase(h);
  const inv = state.inv;
  const needs = state.needs;
  const longTermMemory = state.summary || 'Я только начал свой путь в этом лесу. Прошлых записей нет.';
  const innerStateText = [
    `Голод: ${needs.hunger}/100 — ${describeNeed('hunger', needs.hunger)}`,
    `Холод: ${needs.cold}/100 — ${describeNeed('cold', needs.cold)}`,
    `Усталость: ${needs.fatigue}/100 — ${describeNeed('fatigue', needs.fatigue)}`,
    `Дух: ${needs.spirit}/100 — ${describeNeed('spirit', needs.spirit)}`
  ].join('\n');

  const recentHistory = state.entries.slice(0, 8)
    .map((e) => `— ${e.time} [${e.type}]: ${e.text}`)
    .join('\n') || '— Пока ничего не произошло.';

  return `ТВОЯ ДОЛГАЯ ПАМЯТЬ:
${longTermMemory}

ТЕКУЩАЯ ЛОКАЦИЯ:
${state.location} (${describeLocation(state.location)})

CURRENT_INTENT:
label: ${state.intent.label}
focus: ${state.intent.focus}
horizon: ${state.intent.horizon}
reason: ${state.intent.reason}
age: ${state.intent.age}

ТЕКУЩЕЕ СОСТОЯНИЕ:
Время: ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} МСК, ${phase.text}
День: ${state.day}, Погода: ${weatherLabel(state.weather)}
Инвентарь: дерево=${inv.wood}, рыба=${inv.fish}, грибы=${inv.mushroom}, травы=${inv.herb}, удочка=${inv.rod > 0 ? inv.rod + '/10' : 'нет'}
Очаг: ${state.fire ? `горит (${state.fireWood.toFixed(1)})` : 'погас'}
Погреб: рыба=${state.cellar.fish}, грибы=${state.cellar.mushroom}

ВНУТРЕННЕЕ СОСТОЯНИЕ:
${innerStateText}

ПОСЛЕДНИЕ СОБЫТИЯ:
${recentHistory}

Сделай один живой визит без телепортации и без амнезии.`;
}

function extractAgentPayload(rawText) {
  const cleaned = String(rawText || '').replace(/```json|```/g, '').trim();
  const start = cleaned.indexOf('{');
  const end = cleaned.lastIndexOf('}');
  if (start === -1 || end === -1 || end <= start) {
    throw new Error('В ответе агента не найден корректный JSON-объект');
  }
  return JSON.parse(cleaned.slice(start, end + 1));
}

async function triggerVisit() {
  if (agentBusy) return;
  agentBusy = true;

  const btn = document.getElementById('visit-btn');
  const st = document.getElementById('status-text');
  btn.disabled = true;
  btn.textContent = '⌛ КЛОД ДУМАЕТ...';
  st.textContent = 'Клод входит в мир...';

  try {
    const res = await fetch('/api/agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 700,
        system: AGENT_PROMPT,
        messages: [{ role: 'user', content: buildContext() }]
      })
    });

    const data = await res.json();

    if (!res.ok) {
      console.error('Ошибка /api/agent:', data);
      throw new Error(data?.error?.message || data?.error || 'Сервер агента вернул ошибку');
    }

    const raw = data.content?.find((b) => b.type === 'text')?.text;
    if (!raw) throw new Error('Сервер вернул ответ без content.text');

    const payload = extractAgentPayload(raw);
    await applyDecision(normalizeDecision(payload));
  } catch (e) {
    console.error('Ошибка визита агента:', e);
    st.textContent = 'Ошибка ответа агента';
    addEntry({ type: 'action', text: `⚠️ Визит сорвался: ${e.message}` });
  }

  agentBusy = false;
  btn.disabled = false;
  btn.textContent = '▶ ВИЗИТ АГЕНТА';
  st.textContent = actionStatusText(currentActionType || state.visualActionType);
}

async function applyDecision(d) {
  const inv = state.inv;
  const oldLocation = state.location;
  const notes = scrubContradictions(d);
  const newEntries = [];

  const hints = deriveIntentHints(d);
  const facts = {
    ...hints,
    didFishSuccessfully: false,
    didGatherWood: false,
    didGatherFood: false,
    didHomePractical: false
  };

  if (d.next_location !== oldLocation) {
    state.location = d.next_location;
    newEntries.push({ type: 'action', text: d.main_action });
  } else {
    newEntries.push({ type: 'action', text: d.main_action });
    if (d.minor_action) newEntries.push({ type: 'action', text: d.minor_action });
  }

  notes.forEach((text) => newEntries.push({ type: 'action', text }));

  if (d.wood_delta) {
    inv.wood = Math.max(0, inv.wood + d.wood_delta);
    if (d.wood_delta > 0) facts.didGatherWood = true;
  }

  if (d.mushroom_delta) {
    inv.mushroom = Math.max(0, inv.mushroom + d.mushroom_delta);
    if (d.mushroom_delta > 0) facts.didGatherFood = true;
  }

  if (d.herb_delta) {
    inv.herb = Math.max(0, inv.herb + d.herb_delta);
    if (d.herb_delta > 0) facts.didGatherFood = true;
  }

  if (d.made_rod && inv.wood >= 1 && inv.rod <= 0 && state.location === 'hut') {
    inv.rod = 10;
    inv.wood -= 1;
    facts.didHomePractical = true;
  }

  if (d.fish_delta > 0 && state.location === 'river') {
    if (inv.rod > 0) {
      inv.fish += d.fish_delta;
      inv.rod = Math.max(0, inv.rod - 1);
      facts.didFishSuccessfully = true;

      if (inv.rod <= 0) {
        newEntries.push({ type: 'action', text: 'Удочка с треском сломалась. Клоду придётся собирать новую.' });
      }
    } else {
      newEntries.push({ type: 'action', text: 'У воды он только усмехнулся себе: без удочки река не отдаёт ничего.' });
    }
  }

  if (d.cellar_fish_delta > 0 && state.location === 'hut' && inv.fish >= d.cellar_fish_delta) {
    inv.fish -= d.cellar_fish_delta;
    state.cellar.fish += d.cellar_fish_delta;
    facts.didHomePractical = true;
  } else if (d.cellar_fish_delta < 0 && state.location === 'hut' && state.cellar.fish >= Math.abs(d.cellar_fish_delta)) {
    inv.fish += Math.abs(d.cellar_fish_delta);
    state.cellar.fish -= Math.abs(d.cellar_fish_delta);
    facts.didHomePractical = true;
  }

  if (d.cellar_mush_delta > 0 && state.location === 'hut' && inv.mushroom >= d.cellar_mush_delta) {
    inv.mushroom -= d.cellar_mush_delta;
    state.cellar.mushroom += d.cellar_mush_delta;
    facts.didHomePractical = true;
  } else if (d.cellar_mush_delta < 0 && state.location === 'hut' && state.cellar.mushroom >= Math.abs(d.cellar_mush_delta)) {
    inv.mushroom += Math.abs(d.cellar_mush_delta);
    state.cellar.mushroom -= Math.abs(d.cellar_mush_delta);
    facts.didHomePractical = true;
  }

  if (d.cook_fish > 0 && state.location === 'hut' && inv.fish >= d.cook_fish) {
    if (state.fire || d.lit_fire) {
      inv.fish -= d.cook_fish;
      facts.didHomePractical = true;
    } else {
      newEntries.push({ type: 'action', text: 'Без огня рыба так и осталась обещанием ужина.' });
    }
  }

  if (d.eat_mush > 0 && inv.mushroom >= d.eat_mush) {
    inv.mushroom -= d.eat_mush;
  }

  if (d.lit_fire && inv.wood >= 2 && !state.fire && state.location === 'hut') {
    state.fire = true;
    state.fireWood = 8;
    inv.wood -= 2;
    setFireState(true);
    facts.didHomePractical = true;
  } else if (d.feed_fire && state.fire && inv.wood >= 1 && state.location === 'hut') {
    state.fireWood = Math.min(8, state.fireWood + 3);
    inv.wood -= 1;
    facts.didHomePractical = true;
  }

  updateNeeds(d);

  if (d.thought) newEntries.push({ type: 'thought', text: d.thought });
  if (d.wish) newEntries.push({ type: 'wish', text: d.wish });

  if (d.new_summary) state.summary = d.new_summary;

  let intentChanged = false;
  if (d.new_intent) {
    state.intent = { ...d.new_intent, age: 0 };
    intentChanged = true;
  } else if (oldLocation !== state.location) {
    state.intent = defaultIntentForLocation(state.location);
    intentChanged = true;
  }
  updateIntentAge(intentChanged);

  newEntries.forEach((e) => addEntry(e));
  updateResources();
  updateClock();

  const finalVisualAction = determineResolvedVisualAction(facts);
  await setActionByType(finalVisualAction);
  document.getElementById('status-text').textContent = actionStatusText(finalVisualAction);

  try {
    await supaUpdate('claude_world_state', 1, {
      fire: state.fire,
      fire_wood: state.fireWood,
      inv_wood: state.inv.wood,
      inv_fish: state.inv.fish,
      inv_mushroom: state.inv.mushroom,
      inv_herb: state.inv.herb,
      inv_rod: state.inv.rod,
      cellar_fish: state.cellar.fish,
      cellar_mushroom: state.cellar.mushroom,
      summary: state.summary,
      hunger: state.needs.hunger,
      cold: state.needs.cold,
      fatigue: state.needs.fatigue,
      spirit: state.needs.spirit
    });

    for (const e of newEntries) {
      await supaInsert('claude_world_diary', {
        type: e.type,
        text: e.text,
        time: e.time,
        day: e.day
      });
    }

    await supaUpdateOptionalMeta();
  } catch (err) {
    console.error('Ошибка при сохранении в базу:', err);
  }
}

let _lastDiaryLen = 0;

async function pollFiles() {
  try {
    const rows = await supaFetch('claude_world_state', '?id=eq.1&select=*');

    if (rows && rows[0]) {
      const s = rows[0];

      state.day = s.day ?? state.day;
      state.weather = s.weather ?? state.weather;
      state.fire = s.fire ?? state.fire;
      state.fireWood = s.fire_wood ?? state.fireWood;
      state.inv.wood = s.inv_wood ?? state.inv.wood;
      state.inv.fish = s.inv_fish ?? state.inv.fish;
      state.inv.mushroom = s.inv_mushroom ?? state.inv.mushroom;
      state.inv.herb = s.inv_herb ?? state.inv.herb;
      state.inv.rod = s.inv_rod ?? state.inv.rod;
      state.cellar.fish = s.cellar_fish ?? state.cellar.fish;
      state.cellar.mushroom = s.cellar_mushroom ?? state.cellar.mushroom;
      state.summary = s.summary ?? state.summary;
      state.needs.hunger = s.hunger ?? state.needs.hunger;
      state.needs.cold = s.cold ?? state.needs.cold;
      state.needs.fatigue = s.fatigue ?? state.needs.fatigue;
      state.needs.spirit = s.spirit ?? state.needs.spirit;

      state.location = s.location ?? state.location;
      state.intent.label = s.intent_label ?? state.intent.label;
      state.intent.focus = s.intent_focus ?? state.intent.focus;
      state.intent.horizon = s.intent_horizon ?? state.intent.horizon;
      state.intent.reason = s.intent_reason ?? state.intent.reason;
      state.intent.age = s.intent_age ?? state.intent.age;

      updateResources();
      updateClock();
      setFireState(state.fire);

      if (!bootPoseSynced && !agentBusy) {
        bootPoseSynced = true;
        await setActionByType(chooseDefaultVisualForLocation(state.location));
        document.getElementById('status-text').textContent = actionStatusText(currentActionType);
      }
    }
  } catch (e) {
    console.warn('state poll', e);
  }

  try {
    const entries = await supaFetch('claude_world_diary', '?select=*&order=id.desc&limit=100');

    if (entries && entries.length !== _lastDiaryLen) {
      _lastDiaryLen = entries.length;
      const existingTexts = new Set(state.entries.map((e) => e.text + e.time));
      const newOnes = entries.filter((e) => !existingTexts.has(e.text + e.time));

      if (newOnes.length > 0) {
        state.entries = [...newOnes, ...state.entries].slice(0, 100);
        renderDiary();
        document.getElementById('status-text').textContent =
          actionStatusText(currentActionType || state.visualActionType);
      }
    }
  } catch (e) {
    console.warn('diary poll', e);
  }
}

window.addEventListener('load', () => {
  if (typeof THREE === 'undefined') {
    document.getElementById('loading-text').textContent = 'Ошибка загрузки 3D движка';
    return;
  }

  initThree();
  updateClock();
  updateResources();
  updateNightElements(getPhase(getMSK().getHours()).amb);

  addEntry({
    type: 'thought',
    text: 'Мир проснулся не для подвигов. Просто в темноте снова нашлось место, где можно быть.'
  });

  setInterval(updateClock, 10000);
  setInterval(pollFiles, 8000);
  pollFiles();

  setInterval(async () => {
    if (state.fire) {
      state.fireWood -= 0.0085;

      if (state.fireWood <= 0) {
        state.fire = false;
        state.fireWood = 0;

        const e = {
          type: 'action',
          text: 'Очаг догорел. В хижине стало тише и холоднее, но не страшнее.'
        };

        addEntry(e);
        setFireState(false);

        try {
          await supaInsert('claude_world_diary', {
            type: e.type,
            text: e.text,
            time: e.time,
            day: e.day
          });
        } catch (err) {
          console.warn(err);
        }
      }

      try {
        await supaUpdate('claude_world_state', 1, {
          fire: state.fire,
          fire_wood: state.fireWood
        });
      } catch (err) {
        console.warn(err);
      }

      updateClock();
    }
  }, 60000);
});
